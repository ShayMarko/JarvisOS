<!doctype html><html><head><meta charset="utf-8"><title>T67</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#eef3fb}
.amb{position:fixed;inset:0;background:linear-gradient(120deg,#0a1430,#241046,#0a2a3a,#10122e);background-size:300% 300%;filter:saturate(1.1)}
.amb::after{content:"";position:absolute;inset:0;background:radial-gradient(1000px 600px at 70% 30%,rgba(120,180,255,.25),transparent 60%),radial-gradient(900px 600px at 20% 80%,rgba(200,120,255,.2),transparent 60%)}
.scrim{position:fixed;inset:0;background:rgba(4,6,14,.35)}
.app{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;padding:30px 40px}
.top{display:flex;align-items:center;gap:14px}.wm{font-size:19px;font-weight:800;letter-spacing:3px}.st{font-size:12px;color:#c8d4ee}
.greet{margin:28px 0 18px}.greet h1{font-size:30px;font-weight:600}.greet p{color:#c8d4ee;font-size:14px;margin-top:4px}
.cards{display:flex;gap:18px;flex-wrap:wrap}
.g{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:20px;backdrop-filter:blur(24px) saturate(1.4);box-shadow:0 16px 50px rgba(0,0,0,.3)}
.g.lg{flex:1;min-width:320px}
.cl{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#dbe5fb;font-weight:600}
.row{display:flex;align-items:center;gap:10px;font-size:14px;padding:9px 0;border-top:1px solid rgba(255,255,255,.12)}.row:first-of-type{border:0}
.rk{font-size:9px;font-weight:700;padding:3px 7px;border-radius:6px;background:rgba(255,90,110,.3)}
.go{margin-left:auto;font-size:11px;font-weight:700;background:rgba(255,255,255,.94);color:#0a1020;border-radius:9px;padding:6px 11px}
.big{font-size:34px;font-weight:800;margin-top:8px}
.bar{margin-top:auto;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:13px 16px;backdrop-filter:blur(24px)}
.bar input{flex:1;background:0;border:0;outline:0;color:#eef3fb;font-size:15px}.bar input::placeholder{color:#cdd8f0}
</style></head><body>
<div class="amb"></div><div class="scrim"></div>
<div class="app">
<div class="top"><div class="wm">JARVIS</div><div class="st">● Online · Opus · ambient</div></div>
<div class="greet"><h1>Good evening, Shay.</h1><p>3 need you · 2 jobs running · ROI 4.2×</p></div>
<div class="cards">
<div class="g lg"><div class="cl">Needs you · 3</div>
<div class="row"><span class="rk">CRIT</span>Invoice → 14 customers<span class="go">Approve</span></div>
<div class="row"><span class="rk" style="background:rgba(255,200,90,.3)">HIGH</span>Publish SaaS starter<span class="go">Approve</span></div>
<div class="row"><span class="rk" style="background:rgba(255,200,90,.3)">HIGH</span>Deploy micro-API<span class="go">Approve</span></div></div>
<div class="g"><div class="cl">Money</div><div class="big">$3,840</div><div style="font-size:13px;margin-top:4px">▲18% · ROI 4.2×</div></div>
<div class="g"><div class="cl">Jobs</div><div class="big">2</div><div style="font-size:13px;margin-top:4px">habit-tracker 72%</div></div>
</div>
<div class="bar"><span>🎙</span><input placeholder="Ask Jarvis… · say “Hey Jarvis”"><span style="color:#cdd8f0;font-size:12px">⌘K</span></div>
</div></body></html>
