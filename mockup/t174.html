<!doctype html><html><head><meta charset="utf-8"><title>T174</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#eaf2ff;background:radial-gradient(1200px 800px at 50% 30%,#10243a,#070d16 70%)}
.kiosk{height:100vh;display:flex;flex-direction:column;padding:54px 70px}
.top{display:flex;align-items:center;gap:18px}
.wm{font-size:30px;font-weight:800;letter-spacing:6px;color:#5cc8ff}
.online{margin-left:auto;font-size:18px;color:#7fa6cc;display:flex;align-items:center;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;background:#46e0a0;box-shadow:0 0 12px #46e0a0}
.welcome{margin:60px 0 8px;font-size:64px;font-weight:800;letter-spacing:-2px}.welcome b{color:#5cc8ff}
.lead{font-size:24px;color:#86a8cc;margin-bottom:auto}
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:30px}
.tile{background:linear-gradient(160deg,#142b44,#0c1a2c);border:2px solid #244a6e;border-radius:28px;padding:40px 44px;display:flex;align-items:center;gap:30px}
.tile .ic{width:90px;height:90px;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:44px;background:rgba(92,200,255,.14);flex-shrink:0}
.tile .t{font-size:30px;font-weight:700}
.tile .d{font-size:18px;color:#86a8cc;margin-top:6px}
.tile.go{border-color:#46e0a0}.tile.go .ic{background:rgba(70,224,160,.16)}
.tile.amber{border-color:#f2c14e}.tile.amber .ic{background:rgba(242,193,78,.16)}
.foot{margin-top:50px;display:flex;align-items:center;gap:18px;background:rgba(10,20,32,.7);border:2px solid #244a6e;border-radius:20px;padding:22px 30px}
.foot input{flex:1;background:0;border:0;outline:0;color:#eaf2ff;font-size:24px}.foot input::placeholder{color:#5e7da0}
.mic{font-size:32px;color:#5cc8ff}
</style></head><body>
<div class="kiosk">
<div class="top"><div class="wm">JARVIS</div><div class="online"><span class="dot"></span>Online · Opus · 20:34 · Tue Jun 09</div></div>
<div class="welcome">Good evening, <b>Shay.</b></div>
<div class="lead">Tap a tile, or just say "Hey Jarvis"</div>
<div class="tiles">
<div class="tile go"><div class="ic">💸</div><div><div class="t">Money</div><div class="d">Net $3,840 · ROI 4.2× · ▲18%</div></div></div>
<div class="tile amber"><div class="ic">🔔</div><div><div class="t">Needs you · 3</div><div class="d">Invoice 14 customers · $1,240</div></div></div>
<div class="tile"><div class="ic">⚙️</div><div><div class="t">Jobs · 2 running</div><div class="d">habit-tracker 72% · research 40%</div></div></div>
<div class="tile"><div class="ic">🤖</div><div><div class="t">Agents</div><div class="d">51 agents · 26 connectors · 7 products</div></div></div>
</div>
<div class="foot"><span class="mic">🎙</span><input placeholder="Ask Jarvis, or type a /command…"></div>
</div>
</body></html>
