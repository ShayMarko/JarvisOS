<!doctype html><html><head><meta charset="utf-8"><title>T256</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}
body{height:100vh;overflow:hidden;color:#e0eef0;background:linear-gradient(180deg,#030610 0%,#06121f 45%,#0a1c28 100%)}
.top{display:flex;align-items:center;gap:14px;padding:22px 40px;position:relative;z-index:5}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#7fe6c0}
.st{font-size:12px;color:#4a7a6c}.r{margin-left:auto;font-size:13px;color:#6a9a90}
.sky{position:absolute;inset:0;z-index:1}
.greet{position:fixed;top:120px;left:50%;transform:translateX(-50%);z-index:6;text-align:center}
.greet h1{font-size:34px;font-weight:300;letter-spacing:-.5px}.greet h1 b{font-weight:800;color:#aef5dc}
.greet p{color:#6fbfa8;font-size:13px;margin-top:8px;letter-spacing:.5px}
.stats{position:fixed;bottom:120px;left:0;right:0;z-index:6;display:flex;justify-content:center;gap:50px}
.s{text-align:center}.s .v{font-size:34px;font-weight:800;text-shadow:0 0 24px rgba(127,230,192,.35)}.s .l{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#5f9a8a;margin-top:4px}
.s .v.g{color:#aef5dc}.s .v.v{background:linear-gradient(90deg,#9fd0ff,#c5a0ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.bar{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:520px;display:flex;align-items:center;gap:12px;background:rgba(8,20,28,.7);border:1px solid rgba(127,230,192,.22);border-radius:14px;padding:11px 15px;z-index:7;backdrop-filter:blur(10px)}
.bar input{flex:1;background:0;border:0;outline:0;color:#e0eef0;font-size:14px}.bar input::placeholder{color:#4a7a6c}
</style></head><body>
<div class="top"><div class="wm">JARVIS · NIGHT</div><div class="st">● Online · Opus · 20:34</div><div class="r">all systems nominal · 7 products live</div></div>
<svg class="sky" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="a1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7fe6c0" stop-opacity="0"/><stop offset="40%" stop-color="#7fe6c0" stop-opacity=".55"/><stop offset="100%" stop-color="#3fb0a0" stop-opacity="0"/></linearGradient>
<linearGradient id="a2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9fd0ff" stop-opacity="0"/><stop offset="45%" stop-color="#6fc0e0" stop-opacity=".45"/><stop offset="100%" stop-color="#4080c0" stop-opacity="0"/></linearGradient>
<linearGradient id="a3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c5a0ff" stop-opacity="0"/><stop offset="50%" stop-color="#a070e0" stop-opacity=".4"/><stop offset="100%" stop-color="#7040c0" stop-opacity="0"/></linearGradient>
<filter id="blur"><feGaussianBlur stdDeviation="14"/></filter>
<filter id="blur2"><feGaussianBlur stdDeviation="22"/></filter>
</defs>
<!-- stars -->
<g fill="#dff0ff">
<circle cx="180" cy="90" r="1.3" opacity=".7"/><circle cx="420" cy="60" r="1" opacity=".5"/><circle cx="700" cy="110" r="1.4" opacity=".7"/>
<circle cx="980" cy="70" r="1.1" opacity=".6"/><circle cx="1220" cy="120" r="1.3" opacity=".7"/><circle cx="320" cy="200" r="1" opacity=".5"/>
<circle cx="860" cy="180" r="1.2" opacity=".6"/><circle cx="1100" cy="220" r="1" opacity=".5"/><circle cx="560" cy="240" r="1.3" opacity=".6"/>
</g>
<!-- aurora ribbons -->
<g filter="url(#blur2)">
<path d="M-50,120 C300,260 500,80 760,220 C980,340 1180,140 1500,280 L1500,420 C1180,300 980,480 760,360 C500,220 300,400 -50,260 Z" fill="url(#a1)"/>
</g>
<g filter="url(#blur)">
<path d="M-50,260 C250,360 520,200 800,340 C1050,460 1250,280 1500,400 L1500,500 C1250,400 1050,560 800,440 C520,300 250,460 -50,360 Z" fill="url(#a2)"/>
</g>
<g filter="url(#blur)">
<path d="M-50,200 C300,300 480,160 720,300 L720,360 C480,240 300,380 -50,300 Z" fill="url(#a3)" opacity=".8"/>
</g>
<!-- horizon silhouette -->
<path d="M0,760 L120,720 L240,745 L360,690 L520,730 L660,680 L820,720 L980,675 L1140,715 L1300,690 L1440,720 L1440,900 L0,900 Z" fill="#020508"/>
<path d="M0,800 L1440,800 L1440,900 L0,900 Z" fill="#010305"/>
<!-- aurora reflection -->
<rect x="0" y="760" width="1440" height="50" fill="url(#a1)" opacity=".1"/>
</svg>
<div class="greet"><h1>Good evening, <b>Shay.</b></h1><p>The night runs quiet. Two jobs working, nothing on fire.</p></div>
<div class="stats">
<div class="s"><div class="v g">$3,840</div><div class="l">Net · ▲18%</div></div>
<div class="s"><div class="v v">4.2×</div><div class="l">ROI</div></div>
<div class="s"><div class="v">2</div><div class="l">Jobs running</div></div>
<div class="s"><div class="v" style="color:#9fd0ff">$58<span style="font-size:18px;color:#5f9a8a">/80</span></div><div class="l">AI budget</div></div>
</div>
<div class="bar"><span style="color:#7fe6c0">🎙</span><input placeholder="Ask Jarvis, or type a /command… · say “Hey Jarvis”"><span style="color:#4a7a6c;font-size:12px">⌘K</span></div>
</body></html>
