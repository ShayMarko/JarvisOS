<!doctype html><html><head><meta charset="utf-8"><title>T39</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8eef8;background:radial-gradient(1000px 800px at 50% 40%,#101830,#06070f)}
.top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:22px 34px;z-index:5}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#7ab0ff}.st{font-size:12px;color:#6a7aa0}
.cap{position:fixed;top:62px;left:34px;z-index:5}.cap h1{font-size:22px;font-weight:600}.cap h1 b{color:#7ab0ff}.cap p{color:#6a7aa0;font-size:13px;margin-top:3px}
.scene{position:absolute;inset:0;display:grid;place-items:center}
.iso{transform:rotateX(54deg) rotateZ(45deg);transform-style:preserve-3d;display:grid;grid-template-columns:repeat(3,150px);grid-template-rows:repeat(3,150px);gap:18px}
.tile{position:relative;border-radius:14px;background:linear-gradient(160deg,rgba(40,56,96,.85),rgba(18,26,48,.85));border:1px solid rgba(120,160,255,.3);box-shadow:0 26px 0 -6px rgba(60,90,160,.5),0 30px 40px rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#dbe6ff}
.tile.hi{background:linear-gradient(160deg,rgba(70,200,255,.4),rgba(20,40,80,.85));box-shadow:0 26px 0 -6px rgba(40,120,200,.6),0 30px 50px rgba(60,160,255,.3)}
.tile.warn{background:linear-gradient(160deg,rgba(255,200,90,.4),rgba(40,30,10,.85));box-shadow:0 26px 0 -6px rgba(180,140,40,.6),0 30px 50px rgba(255,200,90,.2)}
.tile .i{font-size:24px}.tile .l{font-size:11px;opacity:.8;margin-top:4px}.tile .v{font-size:18px;font-weight:700}
.tall{box-shadow:0 50px 0 -6px rgba(40,120,200,.55),0 54px 50px rgba(0,0,0,.5)}
.bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:500px;display:flex;align-items:center;gap:12px;background:rgba(14,22,42,.85);border:1px solid rgba(120,160,255,.3);border-radius:14px;padding:11px 15px;z-index:5}
.bar input{flex:1;background:0;border:0;outline:0;color:#e8eef8;font-size:14px}.bar input::placeholder{color:#6a7aa0}
</style></head><body>
<div class="top"><div class="wm">JARVIS · GRID</div><div class="st">● ONLINE · OPUS</div></div>
<div class="cap"><h1>Good evening, <b>Shay</b>.</h1><p>3 need you · 2 jobs · ROI 4.2×</p></div>
<div class="scene"><div class="iso">
<div class="tile hi tall"><div class="i">◈</div><div class="l">Money</div><div class="v">$3,840</div></div>
<div class="tile warn"><div class="i">⚠</div><div class="l">Needs you</div><div class="v">3</div></div>
<div class="tile"><div class="i">⚇</div><div class="l">Agents</div><div class="v">51</div></div>
<div class="tile"><div class="i">⊞</div><div class="l">Connectors</div><div class="v">26</div></div>
<div class="tile hi"><div class="i">J</div><div class="l">Jarvis</div></div>
<div class="tile"><div class="i">≋</div><div class="l">Jobs</div><div class="v">2</div></div>
<div class="tile"><div class="i">✉</div><div class="l">Inbox</div><div class="v">3</div></div>
<div class="tile"><div class="i">▤</div><div class="l">Files</div></div>
<div class="tile tall"><div class="i">7</div><div class="l">products live</div></div>
</div></div>
<div class="bar"><span style="color:#7ab0ff">🎙</span><input placeholder="Ask Jarvis, or type a /command…"><span style="color:#6a7aa0;font-size:12px">⌘K</span></div>
</body></html>
