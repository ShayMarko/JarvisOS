<!doctype html><html><head><meta charset="utf-8"><title>T128</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8edf4;background:#06080c;display:flex;align-items:center;justify-content:center}
.phone{width:390px;height:844px;background:radial-gradient(600px 600px at 50% 18%,#1a2a4d,#0a0f1a 65%);border-radius:54px;border:1px solid #1c2430;position:relative;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.6);display:flex;flex-direction:column;padding:64px 30px 36px}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:120px;height:30px;background:#000;border-radius:18px;z-index:9}
.wm{font-size:14px;font-weight:800;letter-spacing:4px;color:#7c9cff;text-align:center}
.illus{flex:1;display:flex;align-items:center;justify-content:center}
.orb{position:relative;width:240px;height:240px}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(124,156,255,.3)}
.r1{inset:0}.r2{inset:34px;border-color:rgba(95,199,255,.25)}.r3{inset:72px;border-color:rgba(70,224,160,.25)}
.core{position:absolute;inset:96px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#9db6ff,#5872d6 60%,#2c3a80);box-shadow:0 0 60px rgba(124,156,255,.6)}
.node{position:absolute;width:12px;height:12px;border-radius:50%;background:#46e0a0;box-shadow:0 0 12px #46e0a0}
.n1{top:6px;left:50%;margin-left:-6px}.n2{bottom:34px;right:8px;background:#5fc7ff;box-shadow:0 0 12px #5fc7ff}.n3{top:90px;left:0;background:#b18cff;box-shadow:0 0 12px #b18cff}
.txt{text-align:center;padding:0 6px}
.h{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.15}.h b{color:#7c9cff}
.p{font-size:14px;color:#8a96a8;line-height:1.55;margin-top:12px}
.dots{display:flex;gap:9px;justify-content:center;margin:26px 0}
.d{width:8px;height:8px;border-radius:50%;background:#2a3445}.d.on{width:24px;border-radius:5px;background:#7c9cff}
.cta{background:linear-gradient(90deg,#7c9cff,#46e0a0);border-radius:16px;padding:16px;text-align:center;font-weight:800;color:#0a1020;font-size:15px}
.skip{text-align:center;color:#5b6678;font-size:13px;margin-top:16px}
</style></head><body>
<div class="phone">
  <div class="notch"></div>
  <div class="wm">JARVIS</div>
  <div class="illus">
    <div class="orb">
      <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
      <div class="core"></div>
      <div class="node n1"></div><div class="node n2"></div><div class="node n3"></div>
    </div>
  </div>
  <div class="txt">
    <div class="h">Your <b>AI operating system</b></div>
    <div class="p">51 agents and 26 connectors work in the background — earning, building and publishing while you sleep. Net $3,840 this month, ROI 4.2×.</div>
  </div>
  <div class="dots"><div class="d on"></div><div class="d"></div><div class="d"></div><div class="d"></div></div>
  <div class="cta">Get started</div>
  <div class="skip">Already set up? Sign in</div>
</div>
</body></html>
