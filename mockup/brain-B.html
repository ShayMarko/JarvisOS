<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS · Neural Map</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(1100px 800px at 55% 45%, #0b1020, #05070d 75%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #dce8fb;
  }
  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg { width: min(96vw, 1400px); height: auto; display: block; }
  .wordmark {
    position: absolute;
    top: 26px;
    left: 34px;
    z-index: 5;
    user-select: none;
  }
  .wordmark .name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #eaf2ff;
  }
  .wordmark .status {
    margin-top: 5px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #5f7298;
  }
  .wordmark .status .dot { color: #58e08a; }
  .caption {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    color: #6a7ea5;
    text-transform: uppercase;
    z-index: 5;
    user-select: none;
  }
  .hub { cursor: pointer; }
  .hub circle.core { transition: transform .15s ease; transform-origin: center; transform-box: fill-box; }
  .hub:hover { filter: brightness(1.18); }
  .hub:hover .ring-outer { stroke-opacity: .9; }
  .hub-label { font-weight: 700; font-size: 12px; fill: #dce8fb; }
  .hub-sub { font-size: 9px; fill: #7f93b5; }
</style>
</head>
<body>
<div class="stage">
  <div class="wordmark">
    <div class="name">JARVIS</div>
    <div class="status"><span class="dot">&#9679;</span> ONLINE &middot; OPUS &middot; 20:34</div>
  </div>

  <svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" aria-label="Neural brain map">
    <defs>
      <!-- Side-profile brain silhouette, left-facing -->
      <clipPath id="brainclip">
        <path id="brainpath" d="
          M 120 360
          C 110 300, 130 240, 185 200
          C 210 160, 250 130, 305 122
          C 330 95, 380 82, 430 92
          C 470 70, 540 70, 590 96
          C 650 84, 720 100, 760 150
          C 815 165, 855 215, 858 280
          C 880 305, 882 350, 858 378
          C 855 405, 835 425, 805 430
          C 800 460, 778 482, 745 486
          C 760 510, 752 545, 720 560
          C 728 590, 700 618, 662 612
          C 648 636, 612 644, 585 628
          C 560 642, 525 632, 512 608
          C 500 600, 492 588, 490 574
          C 470 580, 448 572, 440 552
          C 410 562, 378 548, 372 518
          C 340 522, 312 502, 312 470
          C 280 472, 250 455, 240 425
          C 200 425, 162 408, 150 372
          C 132 372, 122 366, 120 360 Z
        "/>
      </clipPath>

      <radialGradient id="hubGrad" cx="38%" cy="34%" r="68%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="42%" stop-color="#7cc0ff"/>
        <stop offset="100%" stop-color="#1d63b4"/>
      </radialGradient>

      <filter id="hubGlow" x="-160%" y="-160%" width="420%" height="420%">
        <feGaussianBlur stdDeviation="4.5" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="edgeGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="pulseGlow" x="-300%" y="-300%" width="700%" height="700%">
        <feGaussianBlur stdDeviation="2.2"/>
      </filter>
    </defs>

    <!-- faint glow under the whole brain -->
    <ellipse cx="500" cy="370" rx="400" ry="280" fill="#0c2547" opacity="0.35" filter="url(#edgeGlow)"/>

    <!-- DENSE neural network clipped to brain -->
    <g clip-path="url(#brainclip)">
      <rect x="100" y="80" width="800" height="560" fill="#0a142a" opacity="0.55"/>
      <g id="netSynapses" stroke="#2c6db4" fill="none"></g>
      <g id="netNodes"></g>
      <g id="netPulses"></g>
    </g>

    <!-- brain outline stroke (on top so profile edge shows) -->
    <use href="#brainpath" fill="none" stroke="#214e80" stroke-width="2" filter="url(#edgeGlow)" opacity="0.95"/>
    <use href="#brainpath" fill="none" stroke="#3a78bd" stroke-width="1" opacity="0.5"/>

    <!-- gyri fold lines following cerebrum contour -->
    <g fill="none" stroke="#1f4d7d" stroke-width="1.4" opacity="0.55" stroke-linecap="round">
      <path d="M 180 240 C 250 195, 340 175, 430 178 C 520 181, 610 168, 690 185"/>
      <path d="M 200 300 C 280 258, 380 245, 470 250 C 560 255, 650 245, 730 270"/>
      <path d="M 235 360 C 320 330, 420 322, 510 330 C 600 338, 690 335, 760 360"/>
      <path d="M 250 175 C 300 145, 360 132, 420 138"/>
      <path d="M 470 110 C 540 102, 615 112, 660 140"/>
      <path d="M 300 420 C 380 398, 470 396, 545 408"/>
    </g>

    <!-- cerebellum delineation lines (lower-right back) -->
    <g fill="none" stroke="#1f4d7d" stroke-width="1.3" opacity="0.6" stroke-linecap="round">
      <path d="M 560 540 C 610 530, 665 538, 700 560"/>
      <path d="M 555 565 C 605 558, 660 566, 692 585"/>
      <path d="M 565 515 C 615 506, 668 512, 700 532"/>
      <!-- brain stem -->
      <path d="M 520 600 C 528 620, 540 632, 560 632"/>
      <path d="M 505 590 C 510 612, 522 626, 540 628"/>
    </g>

    <!-- HUB NEURONS overlay -->
    <g id="hubs"></g>
  </svg>

  <div class="caption">NEURAL MAP &middot; tap a neuron to open</div>
</div>

<script>
(function () {
  "use strict";

  // ---- seeded RNG: mulberry32 ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  var rand = mulberry32(1337);

  var SVGNS = "http://www.w3.org/2000/svg";
  function el(name, attrs) {
    var e = document.createElementNS(SVGNS, name);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  // ---- point-in-path test using the brain clip path ----
  var svg = document.querySelector("svg");
  var brainPath = document.getElementById("brainpath");
  // build an offscreen test point
  var testPt = svg.createSVGPoint();
  function inBrain(x, y) {
    testPt.x = x; testPt.y = y;
    return brainPath.isPointInFill(testPt);
  }

  // ---- generate dense point cloud inside brain ----
  var NODES = [];
  var TARGET = 340;
  var attempts = 0;
  while (NODES.length < TARGET && attempts < TARGET * 40) {
    attempts++;
    var x = 110 + rand() * 770;
    var y = 90 + rand() * 540;
    if (!inBrain(x, y)) continue;
    // light spacing rejection to avoid clumps
    var ok = true;
    for (var i = 0; i < NODES.length; i++) {
      var dx = NODES[i].x - x, dy = NODES[i].y - y;
      if (dx * dx + dy * dy < 130) { ok = false; break; }
    }
    if (!ok) continue;
    NODES.push({ x: x, y: y, r: 1.2 + rand() * 1.8 });
  }

  // ---- connect each node to 2-3 nearest neighbors ----
  var synG = document.getElementById("netSynapses");
  function curve(a, b) {
    var mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    var nx = -(b.y - a.y), ny = (b.x - a.x);
    var len = Math.hypot(nx, ny) || 1;
    var bow = (rand() - 0.5) * 26;
    var cx = mx + (nx / len) * bow;
    var cy = my + (ny / len) * bow;
    return "M " + a.x.toFixed(1) + " " + a.y.toFixed(1) +
           " Q " + cx.toFixed(1) + " " + cy.toFixed(1) +
           " " + b.x.toFixed(1) + " " + b.y.toFixed(1);
  }
  var seen = {};
  for (var i = 0; i < NODES.length; i++) {
    var a = NODES[i];
    var dists = [];
    for (var j = 0; j < NODES.length; j++) {
      if (i === j) continue;
      var dx = NODES[j].x - a.x, dy = NODES[j].y - a.y;
      dists.push({ j: j, d: dx * dx + dy * dy });
    }
    dists.sort(function (p, q) { return p.d - q.d; });
    var k = 2 + (rand() < 0.5 ? 1 : 0);
    for (var n = 0; n < k && n < dists.length; n++) {
      var jj = dists[n].j;
      var key = i < jj ? i + "_" + jj : jj + "_" + i;
      if (seen[key]) continue;
      seen[key] = 1;
      var p = el("path", {
        d: curve(a, NODES[jj]),
        "stroke-width": (0.5 + rand() * 0.7).toFixed(2),
        "stroke-opacity": (0.15 + rand() * 0.25).toFixed(2)
      });
      synG.appendChild(p);
    }
  }

  // ---- node dots ----
  var nodeG = document.getElementById("netNodes");
  for (var i = 0; i < NODES.length; i++) {
    var nd = NODES[i];
    nodeG.appendChild(el("circle", {
      cx: nd.x.toFixed(1), cy: nd.y.toFixed(1), r: nd.r.toFixed(2),
      fill: "#5aa0e0", "fill-opacity": (0.55 + rand() * 0.4).toFixed(2)
    }));
  }

  // ---- bright pulse dots ----
  var pulseG = document.getElementById("netPulses");
  var pulseCount = 0;
  var idxOrder = NODES.map(function (_, i) { return i; }).sort(function () { return rand() - 0.5; });
  for (var p2 = 0; p2 < idxOrder.length && pulseCount < 22; p2++) {
    var nd2 = NODES[idxOrder[p2]];
    var c = el("circle", {
      cx: nd2.x.toFixed(1), cy: nd2.y.toFixed(1),
      r: (2 + rand() * 1.4).toFixed(2),
      fill: "#aee9ff", filter: "url(#pulseGlow)"
    });
    pulseG.appendChild(c);
    pulseCount++;
  }

  // ---- helper: nearest network nodes to a point ----
  function nearestNodes(x, y, count) {
    var arr = [];
    for (var i = 0; i < NODES.length; i++) {
      var dx = NODES[i].x - x, dy = NODES[i].y - y;
      arr.push({ i: i, d: dx * dx + dy * dy });
    }
    arr.sort(function (a, b) { return a.d - b.d; });
    return arr.slice(0, count).map(function (o) { return NODES[o.i]; });
  }

  // ---- HUB neurons placed at lobe-like positions ----
  // [x, y, label, sub, critical?, labelDX, labelAnchor]
  var HUBS = [
    { x: 250, y: 215, label: "Today",      sub: "proactive",   anchor: "middle", ldy: -22 },
    { x: 215, y: 320, label: "Chat",       sub: "live",        anchor: "end",    lx: -18, ldy: 4 },
    { x: 270, y: 415, label: "Voice",      sub: "ready",       anchor: "end",    lx: -18, ldy: 4 },
    { x: 360, y: 280, label: "Memory",     sub: "semantic",    anchor: "middle", ldy: -22 },
    { x: 460, y: 200, label: "Knowledge",  sub: "KB",          anchor: "middle", ldy: -22 },
    { x: 470, y: 330, label: "Timeline",   sub: "episodic",    anchor: "middle", ldy: 26 },
    { x: 600, y: 250, label: "Money",      sub: "$3,840",      anchor: "middle", ldy: -22 },
    { x: 580, y: 380, label: "Agents",     sub: "51",          anchor: "middle", ldy: 26 },
    { x: 700, y: 300, label: "Connectors", sub: "9 live",      anchor: "start",  lx: 18, ldy: 4 },
    { x: 645, y: 545, label: "Jobs",       sub: "2 running",   anchor: "middle", ldy: 26 },
    { x: 525, y: 470, label: "Approvals",  sub: "3 need you",  critical: true, anchor: "middle", ldy: 26 }
  ];

  var hubsG = document.getElementById("hubs");

  HUBS.forEach(function (h) {
    var g = el("g", { class: "hub" });

    // spokes to nearest network nodes (bright)
    var near = nearestNodes(h.x, h.y, 5);
    near.forEach(function (nd) {
      g.appendChild(el("line", {
        x1: h.x, y1: h.y, x2: nd.x.toFixed(1), y2: nd.y.toFixed(1),
        stroke: "#9fd3ff", "stroke-width": "1", "stroke-opacity": "0.45"
      }));
    });

    // faint outer ring
    var ringColor = h.critical ? "#ff5d73" : "#5aa0e0";
    g.appendChild(el("circle", {
      class: "ring-outer",
      cx: h.x, cy: h.y, r: 20,
      fill: "none", stroke: ringColor,
      "stroke-width": h.critical ? "1.6" : "1.1",
      "stroke-opacity": h.critical ? "0.7" : "0.35"
    }));

    // glowing core
    g.appendChild(el("circle", {
      class: "core",
      cx: h.x, cy: h.y, r: 11,
      fill: "url(#hubGrad)", filter: "url(#hubGlow)"
    }));
    // inner highlight
    g.appendChild(el("circle", {
      cx: h.x - 2.5, cy: h.y - 3, r: 3,
      fill: "#ffffff", "fill-opacity": "0.85"
    }));

    // label
    var lx = h.x + (h.lx || 0);
    var ly = h.y + (h.ldy || -22);
    var lab = el("text", {
      x: lx, y: ly,
      class: "hub-label",
      "text-anchor": h.anchor || "middle"
    });
    lab.textContent = h.label;
    g.appendChild(lab);

    // sub-label
    var sub = el("text", {
      x: lx, y: ly + 12,
      class: "hub-sub",
      "text-anchor": h.anchor || "middle"
    });
    if (h.critical) sub.setAttribute("fill", "#ff9cb0");
    sub.textContent = h.sub;
    g.appendChild(sub);

    hubsG.appendChild(g);
  });
})();
</script>
</body>
</html>
