<!doctype html><html><head><meta charset="utf-8"><title>T19</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8e6e1;background:radial-gradient(700px 700px at 50% 46%,#15140f,#0a0a08);display:flex;flex-direction:column;align-items:center;justify-content:center}
.kicker{position:fixed;top:34px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#6f6a5c}
.ring{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,#f3e9c8,#caa85f);box-shadow:0 0 40px rgba(202,168,95,.7),0 0 90px rgba(202,168,95,.25);margin-bottom:48px;animation:pulse 3s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.25);opacity:.85}}
.greet{font-size:30px;font-weight:300;letter-spacing:.5px;color:#efece4}.greet b{font-weight:500;color:#e9d8a6}
.line{margin-top:46px;width:560px;max-width:80vw;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(220,210,180,.25);padding:12px 6px}
.line input{flex:1;background:0;border:0;outline:0;color:#efece4;font-size:18px;font-weight:300}.line input::placeholder{color:#6f6a5c}
.line .k{font-size:11px;color:#8a8270;border:1px solid rgba(220,210,180,.25);border-radius:6px;padding:3px 8px}
.foot{position:fixed;bottom:30px;left:0;right:0;text-align:center;font-size:12px;letter-spacing:1px;color:#5f5b50}
.foot b{color:#9a9382}
</style></head><body>
<div class="kicker">J · A · R · V · I · S &nbsp;·&nbsp; online · opus</div>
<div class="ring"></div>
<div class="greet">Good evening, <b>Shay</b>. What shall we do?</div>
<div class="line"><span style="color:#caa85f;font-size:18px">🎙</span><input placeholder="Speak, or type anything…"><span class="k">⌘K</span></div>
<div class="foot"><b>3</b> need you &nbsp;·&nbsp; <b>2</b> jobs running &nbsp;·&nbsp; net <b>$3,840</b> &nbsp;·&nbsp; ROI <b>4.2×</b></div>
</body></html>
