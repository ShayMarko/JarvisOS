<!doctype html><html><head><meta charset="utf-8"><title>T222</title><style>
*{margin:0;box-sizing:border-box;font-family:'Helvetica Neue','Arial Narrow',system-ui,sans-serif}
body{height:100vh;overflow:hidden;background:#161210;display:flex;align-items:center;justify-content:center}
.poster{width:920px;height:860px;background:#f3ead4;color:#1a1409;position:relative;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.7);
 background-image:radial-gradient(rgba(120,90,40,.05) 1px,transparent 1px);background-size:5px 5px}

.top .st{font-size:12px;letter-spacing:2px;font-weight:700;color:#9a2a18}

.amt span{font-size:64px;vertical-align:top}
.sub{font-size:24px;font-weight:800;letter-spacing:1px;border-top:4px solid #1a1409;border-bottom:4px solid #1a1409;padding:12px 0;margin-top:14px;display:flex;justify-content:space-between}
.sub b{color:#9a2a18}
.row{display:flex;justify-content:space-between;gap:18px;margin-top:18px}
.chip{flex:1;border:3px solid #1a1409;padding:10px 12px}
.chip .n{font-size:11px;letter-spacing:2px;font-weight:800;text-transform:uppercase;color:#9a2a18}
.chip .v{font-size:22px;font-weight:900;letter-spacing:-1px;margin-top:2px}
.foot{margin-top:auto;display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.foot .big{font-size:34px;font-weight:900;letter-spacing:-1px}
.mono{font-family:ui-monospace,monospace;font-weight:400;letter-spacing:0}

</div>
