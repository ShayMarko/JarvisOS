<!doctype html><html><head><meta charset="utf-8"><title>T73</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8ecf6;background:radial-gradient(900px 600px at 50% -10%,#141a32,#070910)}
.top{text-align:center;padding:26px}.wm{font-size:19px;font-weight:800;letter-spacing:4px;color:#74b6ff}.st{font-size:12px;color:#6a7498;margin-top:4px}
.seg{display:flex;gap:6px;max-width:560px;margin:0 auto;background:rgba(20,26,46,.7);border:1px solid rgba(120,150,220,.2);border-radius:99px;padding:6px}
.pill{flex:1;text-align:center;font-size:13px;font-weight:600;padding:11px;border-radius:99px;color:#8a93b8}
.pill.on{background:linear-gradient(135deg,#74b6ff,#9b8cff);color:#070910}
.panel{max-width:720px;margin:26px auto 0;background:rgba(18,24,44,.6);border:1px solid rgba(120,150,220,.18);border-radius:22px;padding:26px;backdrop-filter:blur(14px)}
.pl{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#6a7498;margin-bottom:14px}
.row{display:flex;align-items:center;gap:12px;font-size:15px;padding:13px 0;border-top:1px solid rgba(120,150,220,.12)}.row:first-of-type{border:0}
.rk{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;color:#ff6b81;background:rgba(255,107,129,.14)}.rk.h{color:#ffc85a;background:rgba(255,200,90,.14)}
.go{margin-left:auto;font-size:12px;font-weight:700;color:#070910;background:linear-gradient(135deg,#74b6ff,#9b8cff);border-radius:9px;padding:8px 14px}
.bar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:560px;display:flex;align-items:center;gap:12px;background:rgba(20,26,46,.8);border:1px solid rgba(120,150,220,.25);border-radius:14px;padding:12px 16px}
.bar input{flex:1;background:0;border:0;outline:0;color:#e8ecf6;font-size:15px}.bar input::placeholder{color:#6a7498}
</style></head><body>
<div class="top"><div class="wm">JARVIS</div><div class="st">Good evening, Shay · ● Opus · ROI 4.2×</div></div>
<div class="seg"><div class="pill on">Needs you · 3</div><div class="pill">Money</div><div class="pill">Jobs · 2</div><div class="pill">Inbox · 3</div></div>
<div class="panel"><div class="pl">Needs you · 3 waiting</div>
<div class="row"><span class="rk">CRIT</span>Send invoice → 14 customers<span class="go">Approve</span></div>
<div class="row"><span class="rk h">HIGH</span>Publish "SaaS starter" → Gumroad<span class="go">Approve</span></div>
<div class="row"><span class="rk h">HIGH</span>Deploy micro-API → Cloudflare<span class="go">Approve</span></div>
</div>
<div class="bar"><span style="color:#74b6ff">🎙</span><input placeholder="Ask Jarvis, or type a /command… · say “Hey Jarvis”"><span style="color:#6a7498;font-size:12px">⌘K</span></div>
</body></html>
