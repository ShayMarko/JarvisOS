<!doctype html><html><head><meta charset="utf-8"><title>T184</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e6f2ee;background:#06100c}
.top{display:flex;align-items:center;gap:14px;padding:22px 40px}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#46e0a0}.st{font-size:12px;color:#4f8a72}.r{margin-left:auto;font-size:13px;color:#7fa899}
.hd{padding:0 40px}.hd h1{font-size:22px;font-weight:600}.hd h1 b{color:#46e0a0}.hd p{font-size:13px;color:#4f8a72;margin-top:4px}
.plot{margin:14px 40px 0;background:#091813;border:1px solid #12281f;border-radius:16px;padding:18px 24px 14px;height:calc(100vh - 250px);display:flex;flex-direction:column}
.cl{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#4f8a72;display:flex;justify-content:space-between;align-items:center}
.lg{display:flex;align-items:center;gap:7px;font-size:11px;color:#7fa899}.lg i{width:14px;height:14px;display:inline-block}
.bar{position:fixed;bottom:22px;left:40px;right:40px;display:flex;align-items:center;gap:12px;background:rgba(9,24,19,.9);border:1px solid #12281f;border-radius:13px;padding:11px 15px}
.bar input{flex:1;background:0;border:0;outline:0;color:#e6f2ee;font-size:14px}.bar input::placeholder{color:#4f8a72}
</style></head><body>
<div class="top"><div class="wm">JARVIS · HEXBIN</div><div class="st">● ONLINE · OPUS · 20:34</div><div class="r">Activity density · hour × weekday</div></div>
<div class="hd"><h1>Good evening, <b>Shay.</b></h1><p>where your agents are busiest — each hexagon shaded by task volume</p></div>
<div class="plot">
<div class="cl"><span>task runs · darker = denser</span><div class="lg">low <i style="background:#103024"></i><i style="background:#1d6e4a"></i><i style="background:#2faf72"></i><i style="background:#46e0a0"></i><i style="background:#aef7d6"></i> high</div></div>
<svg viewBox="0 0 1140 470" style="width:100%;height:100%;margin-top:6px" preserveAspectRatio="xMidYMid meet">
<g fill="#4f8a72" font-size="11" text-anchor="end"><text x="78" y="60">Mon</text><text x="78" y="116">Tue</text><text x="78" y="172">Wed</text><text x="78" y="228">Thu</text><text x="78" y="284">Fri</text><text x="78" y="340">Sat</text><text x="78" y="396">Sun</text></g>
<g fill="#4f8a72" font-size="10" text-anchor="middle"><text x="120" y="440">0h</text><text x="360" y="440">6h</text><text x="600" y="440">12h</text><text x="840" y="440">18h</text><text x="1080" y="440">24h</text></g>
<g id="hexgrid" stroke="#06100c" stroke-width="1"></g>
<script>
(function(){
 var g=document.getElementById('hexgrid');
 var pal=['#0c241a','#103024','#16553a','#1d6e4a','#2faf72','#46e0a0','#7af0bf','#aef7d6'];
 var R=15,W=R*Math.sqrt(3),H=R*1.5;
 // intensity model: busy midday weekdays, quiet weekend/night
 for(var row=0;row<7;row++){
  for(var col=0;col<24;col++){
   var cx=120+col*40+(row%2?20:0);
   var cy=52+row*56;
   var hr=col, isWk=row<5;
   var base=isWk?(hr>=8&&hr<=20?(1-Math.abs(hr-14)/9):0.12):(hr>=10&&hr<=18?0.4:0.08);
   var n=Math.max(0,Math.min(1,base+(Math.sin(col*1.7+row)*0.12)));
   if(n<0.04) continue;
   var idx=Math.min(7,Math.floor(n*7.99));
   var pts=[];
   for(var a=0;a<6;a++){var ang=Math.PI/180*(60*a-30);pts.push((cx+R*Math.cos(ang)).toFixed(1)+','+(cy+R*Math.sin(ang)).toFixed(1));}
   var p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
   p.setAttribute('points',pts.join(' '));p.setAttribute('fill',pal[idx]);
   g.appendChild(p);
  }
 }
})();
</script>
</svg>
</div>
<div class="bar"><span style="color:#46e0a0">🎙</span><input placeholder="Ask Jarvis when you're most productive…"><span style="color:#4f8a72;font-size:12px">⌘K</span></div>
</body></html>
