*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e6ebf4;background:#0a0c12}
.top{display:flex;align-items:center;gap:14px;padding:18px 30px}.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#7a9cff}.st{font-size:12px;color:#6a728c}.r{margin-left:auto;font-size:14px;font-weight:600}.r span{color:#6a728c;font-weight:400}

.bar{position:fixed;bottom:20px;left:30px;right:30px;display:flex;align-items:center;gap:12px;background:#0e1320;border:1px solid #19202e;border-radius:13px;padding:11px 15px}
.bar input{flex:1;background:0;border:0;outline:0;color:#e6ebf4;font-size:14px}.bar input::placeholder{color:#5d6480}
