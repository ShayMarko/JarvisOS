<!doctype html><html><head><meta charset="utf-8"><title>T272</title><style>
*{margin:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
body{height:100vh;overflow:hidden;background:radial-gradient(circle at 50% 40%,#15171c,#080809);display:flex;align-items:center;justify-content:center}
/* tall narrow band display */
.band{width:300px;height:760px;border-radius:54px;background:#000;position:relative;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 12px #131418,0 0 0 13px #2a2c33}
.screen{position:absolute;inset:10px;border-radius:46px;background:linear-gradient(#0a0c10,#060708);overflow:hidden;display:flex;flex-direction:column}
.hd{padding:30px 24px 14px;text-align:center}
.hd .wm{font-size:12px;letter-spacing:4px;color:#ff5e8a;font-weight:800}
.hd .t{font-size:46px;font-weight:200;letter-spacing:-2px;color:#fff;margin-top:6px}
.hd .d{font-size:11px;letter-spacing:2px;color:#6a7079;margin-top:2px}
.metric{padding:18px 24px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:14px}
.metric .ring{width:50px;height:50px;flex:none}
.metric .lb{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7a808a}
.metric .v{font-size:24px;font-weight:700;color:#fff;line-height:1.05}
.metric .v small{font-size:12px;color:#9aa0aa;font-weight:500}
.accent .v{color:#ff5e8a}
.spark{padding:16px 24px;border-top:1px solid rgba(255,255,255,.06)}
.spark .lb{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#7a808a;margin-bottom:8px}
.spark .v{font-size:30px;font-weight:300;color:#fff}.spark .v b{color:#5fdca6;font-size:14px;font-weight:700}
.foot{margin-top:auto;padding:18px 24px 30px;text-align:center}
.foot .pill{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:#ffd; background:rgba(255,94,138,.14);color:#ff9bb6;border-radius:20px;padding:7px 14px}
.foot .dots{margin-top:16px;display:flex;justify-content:center;gap:6px}
.foot .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2)}.foot .dots i.on{background:#ff5e8a}
</style></head><body>
<div class="band"><div class="screen">
<div class="hd"><div class="wm">JARVIS</div><div class="t">20:34</div><div class="d">TUE · JUN 09 · ● OPUS</div></div>
<div class="metric accent">
<svg class="ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.5" fill="none" stroke="#23262d" stroke-width="3.5"/><circle cx="18" cy="18" r="15.5" fill="none" stroke="#ff5e8a" stroke-width="3.5" stroke-dasharray="73 100" stroke-linecap="round" transform="rotate(-90 18 18)"/></svg>
<div><div class="lb">AI budget</div><div class="v">$58<small>/$80</small></div></div>
</div>
<div class="metric">
<svg class="ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.5" fill="none" stroke="#23262d" stroke-width="3.5"/><circle cx="18" cy="18" r="15.5" fill="none" stroke="#5aaaff" stroke-width="3.5" stroke-dasharray="72 100" stroke-linecap="round" transform="rotate(-90 18 18)"/></svg>
<div><div class="lb">habit-tracker</div><div class="v">72<small>%</small></div></div>
</div>
<div class="metric">
<svg class="ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.5" fill="none" stroke="#23262d" stroke-width="3.5"/><circle cx="18" cy="18" r="15.5" fill="none" stroke="#a08cf0" stroke-width="3.5" stroke-dasharray="40 100" stroke-linecap="round" transform="rotate(-90 18 18)"/></svg>
<div><div class="lb">research niche</div><div class="v">40<small>%</small></div></div>
</div>
<div class="spark"><div class="lb">Net · month</div><div class="v">$3,840 <b>▲18%</b></div>
<svg viewBox="0 0 250 40" style="width:100%;height:36px;margin-top:8px"><polyline points="0,34 30,30 60,32 90,24 120,26 150,18 180,20 210,10 250,6" fill="none" stroke="#5fdca6" stroke-width="2.5"/></svg>
</div>
<div class="foot"><span class="pill">⚠ 3 need you</span><div class="dots"><i class="on"></i><i></i><i></i></div></div>
</div></div>
</body></html>
