<!doctype html><html><head><meta charset="utf-8"><title>T6</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;display:grid;place-items:center;background:radial-gradient(1000px 700px at 50% 30%,#11203a,#070a12)}
.phone{width:360px;height:760px;border-radius:46px;background:linear-gradient(160deg,#0a0e1a,#0d1224);border:2px solid #1d2740;box-shadow:0 40px 120px rgba(0,0,0,.6),inset 0 0 0 7px #05070e;position:relative;overflow:hidden;padding:46px 20px 22px}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#05070e;border-radius:0 0 16px 16px}
.sb{display:flex;justify-content:space-between;font-size:12px;color:#8fa3c4;margin-bottom:14px}
.hi{font-size:22px;font-weight:700;color:#eaf1fb}.hi b{background:linear-gradient(135deg,#5ad1ff,#9b8cff);-webkit-background-clip:text;color:transparent}
.sub{font-size:12px;color:#8a9ac0;margin:3px 0 16px}
.card{background:rgba(22,30,50,.7);border:1px solid rgba(140,160,210,.12);border-radius:18px;padding:14px;margin-bottom:12px}
.cl{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:#5d6b88;margin-bottom:8px}
.swipe{display:flex;align-items:center;gap:10px;font-size:13px;color:#dde8f6;padding:9px 0;border-top:1px solid rgba(140,160,210,.1)}.swipe:first-of-type{border:0}
.rk{font-size:9px;font-weight:700;padding:3px 7px;border-radius:6px;color:#ffd166;background:rgba(255,209,102,.12)}.rk.c{color:#ff6b81;background:rgba(255,107,129,.12)}
.go{margin-left:auto;font-size:11px;font-weight:700;color:#06121f;background:linear-gradient(135deg,#5ad1ff,#9b8cff);border-radius:8px;padding:6px 11px}
.money{display:flex;justify-content:space-between;align-items:flex-end}.money .b{font-size:26px;font-weight:800;color:#eaf1fb}
.mic{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:84px;height:84px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#dffcff,#5ad1ff 45%,#2b6fc7);box-shadow:0 0 50px rgba(90,209,255,.7),0 10px 30px rgba(0,0,0,.5);display:grid;place-items:center;font-size:30px}
.ring{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:108px;height:108px;border-radius:50%;border:1px solid rgba(90,209,255,.3)}
.hint{position:absolute;bottom:120px;left:0;right:0;text-align:center;font-size:12px;color:#6f86ad}
</style></head><body>
<div class="phone"><div class="notch"></div>
<div class="sb"><span>20:34</span><span>JARVIS ● Opus</span><span>▮▮▮ 5G</span></div>
<div class="hi">Evening, <b>Shay</b>.</div><div class="sub">3 need you · 2 jobs · ROI 4.2×</div>
<div class="card"><div class="cl">Needs you</div>
<div class="swipe"><span class="rk c">CRIT</span>Invoice → 14<span class="go">Approve</span></div>
<div class="swipe"><span class="rk">HIGH</span>Publish starter<span class="go">Approve</span></div>
<div class="swipe"><span class="rk">HIGH</span>Deploy API<span class="go">Approve</span></div></div>
<div class="card"><div class="cl">Money · month</div><div class="money"><div class="b">$3,840</div><div style="color:#43e0a0;font-size:13px">▲18% · 4.2×</div></div></div>
<div class="card"><div class="cl">Jobs · 2 running</div><div style="font-size:13px;color:#cdd9ee">Habit-tracker 72% · Research 40%</div></div>
<div class="hint">tap to talk · “Hey Jarvis”</div>
<div class="ring"></div><div class="mic">🎙</div>
</div></body></html>
