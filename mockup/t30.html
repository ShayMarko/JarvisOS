<!doctype html><html><head><meta charset="utf-8"><title>T30</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#dffaf2;background:radial-gradient(900px 800px at 50% 50%,#04201a,#020c0a)}
.top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:22px 34px;z-index:5}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#3fe8c0}.st{font-size:12px;color:#4f8a7c}
.cap{position:fixed;top:64px;left:34px;z-index:5}.cap h1{font-size:22px;font-weight:600}.cap h1 b{color:#3fe8c0}.cap p{color:#5f9c8c;font-size:13px;margin-top:3px}
.hive{position:absolute;inset:0;display:grid;place-items:center}
.grid{display:flex;flex-direction:column;gap:6px}
.r{display:flex;gap:6px}.r.off{margin-left:62px}
.hex{width:116px;height:130px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,40,32,.7);border:1px solid rgba(63,232,192,.18);text-align:center}
.hex.on{background:linear-gradient(160deg,rgba(63,232,192,.22),rgba(10,40,32,.6));border-color:rgba(63,232,192,.5)}
.hex.warn{background:linear-gradient(160deg,rgba(255,200,90,.18),rgba(10,40,32,.6));border-color:rgba(255,200,90,.5)}
.hex.dim{opacity:.35}
.hi{font-size:20px}.hl{font-size:10px;color:#8fd0bf;letter-spacing:.5px;margin-top:3px}.hv{font-size:15px;font-weight:700;color:#dffaf2}
.core{background:radial-gradient(circle at 50% 40%,#dffff5,#3fe8c0 50%,#127a62);border:0}.core .hi{font-size:13px;color:#03130f;font-weight:800}
.bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:500px;display:flex;align-items:center;gap:12px;background:rgba(8,28,22,.8);border:1px solid rgba(63,232,192,.3);border-radius:14px;padding:11px 15px;z-index:5}
.bar input{flex:1;background:0;border:0;outline:0;color:#dffaf2;font-size:14px}.bar input::placeholder{color:#4f8a7c}
</style></head><body>
<div class="top"><div class="wm">JARVIS · HIVE</div><div class="st">● ONLINE · OPUS</div></div>
<div class="cap"><h1>Good evening, <b>Shay</b>.</h1><p>tap a cell · 3 need you · ROI 4.2×</p></div>
<div class="hive"><div class="grid">
<div class="r"><div class="hex on"><div class="hi">◈</div><div class="hl">Money</div><div class="hv">$3,840</div></div><div class="hex warn"><div class="hi">⚠</div><div class="hl">Needs you</div><div class="hv">3</div></div><div class="hex"><div class="hi">⚇</div><div class="hl">Agents</div><div class="hv">51</div></div></div>
<div class="r off"><div class="hex"><div class="hi">⊞</div><div class="hl">Connectors</div><div class="hv">26</div></div><div class="hex core"><div class="hi">JARVIS</div></div><div class="hex on"><div class="hi">≋</div><div class="hl">Jobs</div><div class="hv">2</div></div></div>
<div class="r"><div class="hex dim"><div class="hi">▤</div><div class="hl">Files</div></div><div class="hex"><div class="hi">✉</div><div class="hl">Inbox</div><div class="hv">3</div></div><div class="hex dim"><div class="hi">⚙</div><div class="hl">Settings</div></div></div>
</div></div>
<div class="bar"><span style="color:#3fe8c0">🎙</span><input placeholder="Ask Jarvis, or type a /command…"><span style="color:#4f8a7c;font-size:12px">⌘K</span></div>
</body></html>
