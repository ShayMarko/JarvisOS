<!doctype html><html><head><meta charset="utf-8"><title>T53</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#d6f0ee;background:radial-gradient(800px 800px at 50% 50%,#06231f,#03100d)}
.app{display:grid;grid-template-columns:1fr 320px;height:100vh}
.left{position:relative;display:grid;place-items:center}
.top{position:fixed;top:22px;left:34px;z-index:5}.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#3fe0c8}.st{font-size:12px;color:#4f9a8e;margin-top:2px}
svg{width:520px;height:520px}
.axis{stroke:rgba(63,224,200,.2);fill:none}.ring{stroke:rgba(63,224,200,.12);fill:none}
.poly{fill:rgba(63,224,200,.18);stroke:#3fe0c8;stroke-width:2}
.dot{fill:#3fe0c8}
.lbl{fill:#bfeae4;font-size:12px;font-family:Inter}
.side{border-left:1px solid rgba(63,224,200,.15);padding:30px 22px;background:rgba(6,28,24,.5);display:flex;flex-direction:column}
.h1{font-size:22px;font-weight:600}.h1 b{color:#3fe0c8}.sub{color:#5f9a8e;font-size:13px;margin:4px 0 20px}
.row{display:flex;justify-content:space-between;font-size:14px;padding:11px 0;border-bottom:1px solid rgba(63,224,200,.1)}.row b{color:#dff}
.good{color:#46e0a0}.warn{color:#ffc85a}
.bar{margin-top:auto;display:flex;align-items:center;gap:12px;background:rgba(8,28,24,.8);border:1px solid rgba(63,224,200,.3);border-radius:14px;padding:11px 14px}
.bar input{flex:1;background:0;border:0;outline:0;color:#d6f0ee;font-size:14px}.bar input::placeholder{color:#4f9a8e}
</style></head><body><div class="app">
<div class="left"><div class="top"><div class="wm">JARVIS · HEALTH</div><div class="st">● online · opus</div></div>
<svg viewBox="0 0 400 400">
<g class="ring"><circle cx="200" cy="200" r="60"/><circle cx="200" cy="200" r="120"/><circle cx="200" cy="200" r="170"/></g>
<g class="axis"><line x1="200" y1="200" x2="200" y2="20"/><line x1="200" y1="200" x2="371" y2="120"/><line x1="200" y1="200" x2="305" y2="360"/><line x1="200" y1="200" x2="95" y2="360"/><line x1="200" y1="200" x2="29" y2="120"/></g>
<polygon class="poly" points="200,45 350,135 285,330 120,345 70,140"/>
<g class="dot"><circle cx="200" cy="45" r="4"/><circle cx="350" cy="135" r="4"/><circle cx="285" cy="330" r="4"/><circle cx="120" cy="345" r="4"/><circle cx="70" cy="140" r="4"/></g>
<text class="lbl" x="200" y="14" text-anchor="middle">Money</text><text class="lbl" x="378" y="120" text-anchor="start">Uptime</text><text class="lbl" x="305" y="378" text-anchor="middle">Output</text><text class="lbl" x="95" y="378" text-anchor="middle">Cost</text><text class="lbl" x="22" y="120" text-anchor="end">Speed</text>
</svg></div>
<div class="side"><div class="h1">Good evening, <b>Shay</b>.</div><div class="sub">system vitals · all nominal</div>
<div class="row"><span>Money</span><b class="good">$3,840 · 4.2×</b></div>
<div class="row"><span>Uptime</span><b class="good">99.9%</b></div>
<div class="row"><span>Output today</span><b>1,204 actions</b></div>
<div class="row"><span>AI cost</span><b class="warn">$58 / $80</b></div>
<div class="row"><span>Needs you</span><b class="warn">3</b></div>
<div class="bar"><span style="color:#3fe0c8">🎙</span><input placeholder="Ask Jarvis…"><span style="color:#4f9a8e;font-size:12px">⌘K</span></div>
</div></div></body></html>
