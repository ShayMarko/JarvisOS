<!doctype html><html><head><meta charset="utf-8"><title>T41</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#dbe7e9;background:#060d10}
.top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:20px 30px;z-index:5}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#42d4c4}.st{font-size:12px;color:#4f8a86}
.cap{position:fixed;top:60px;left:30px;z-index:5}.cap h1{font-size:21px;font-weight:600}.cap h1 b{color:#42d4c4}.cap p{color:#5f9c96;font-size:13px;margin-top:3px}
.map{position:absolute;inset:0;background:
 radial-gradient(1100px 700px at 50% 45%,#0b2228,#060d10),
 repeating-linear-gradient(0deg,rgba(66,212,196,.05) 0 1px,transparent 1px 60px),
 repeating-linear-gradient(90deg,rgba(66,212,196,.05) 0 1px,transparent 1px 60px)}
.land{position:absolute;border:1px solid rgba(66,212,196,.15);border-radius:40% 60% 55% 45%;background:rgba(66,212,196,.04)}
.l1{width:380px;height:260px;top:24%;left:18%}.l2{width:300px;height:220px;top:42%;right:14%;border-radius:55% 45% 40% 60%}
.pin{position:absolute;transform:translate(-50%,-100%);text-align:center}
.dot{width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);margin:0 auto;border:2px solid #fff}
.dot.m{background:#42d4c4}.dot.w{background:#ffc85a}.dot.r{background:#ff6b81}.dot.b{background:#62a8ff}
.pl{font-size:11px;color:#bfeae4;background:rgba(8,24,26,.8);border:1px solid rgba(66,212,196,.25);border-radius:8px;padding:4px 9px;margin-top:7px;white-space:nowrap}
.pulse{position:absolute;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,107,129,.5);transform:translate(-50%,-100%);margin-top:-8px}
.bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:500px;display:flex;align-items:center;gap:12px;background:rgba(8,22,24,.85);border:1px solid rgba(66,212,196,.3);border-radius:14px;padding:11px 15px;z-index:5}
.bar input{flex:1;background:0;border:0;outline:0;color:#dbe7e9;font-size:14px}.bar input::placeholder{color:#4f8a86}
</style></head><body>
<div class="map"><div class="land l1"></div><div class="land l2"></div></div>
<div class="top"><div class="wm">JARVIS · OPS</div><div class="st">● ONLINE · OPUS</div></div>
<div class="cap"><h1>Good evening, <b>Shay</b>.</h1><p>live operations · 3 need you · ROI 4.2×</p></div>
<div class="pin" style="top:34%;left:30%"><div class="pulse"></div><div class="dot r"></div><div class="pl">⛔ Invoice → 14 · approve</div></div>
<div class="pin" style="top:52%;left:62%"><div class="dot m"></div><div class="pl">◈ Stripe · $3,840 net</div></div>
<div class="pin" style="top:68%;left:28%"><div class="dot b"></div><div class="pl">≋ habit-tracker · 72%</div></div>
<div class="pin" style="top:30%;left:72%"><div class="dot w"></div><div class="pl">✉ Inbox · 3 drafts</div></div>
<div class="pin" style="top:60%;left:46%"><div class="dot m"></div><div class="pl">⚇ 51 agents online</div></div>
<div class="bar"><span style="color:#42d4c4">🎙</span><input placeholder="Ask Jarvis, or type a /command…"><span style="color:#4f8a86;font-size:12px">⌘K</span></div>
</body></html>
