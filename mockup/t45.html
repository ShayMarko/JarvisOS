<!doctype html><html><head><meta charset="utf-8"><title>T45</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e6ecf8;background:radial-gradient(900px 900px at 50% 50%,#101a34,#06070f)}
.top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:22px 34px;z-index:6}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#6fb0ff}.st{font-size:12px;color:#6a78a0}
.stage{position:absolute;inset:0;display:grid;place-items:center}
.ring{position:relative;width:520px;height:520px;border-radius:50%;border:1px dashed rgba(120,160,255,.2)}
.center{position:absolute;inset:0;display:grid;place-items:center;flex-direction:column;z-index:3;text-align:center}
.orb{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#eafaff,#6fb0ff 45%,#1d5fae);box-shadow:0 0 60px rgba(111,176,255,.6)}
.cg{font-size:16px;font-weight:300;margin-top:14px}.cg b{color:#6fb0ff;font-weight:600}.cs{font-size:12px;color:#6a78a0;margin-top:3px}
.item{position:absolute;width:140px;transform:translate(-50%,-50%);background:rgba(18,26,48,.85);border:1px solid rgba(120,160,255,.2);border-radius:16px;padding:14px;text-align:center;backdrop-filter:blur(10px)}
.item.act{border-color:rgba(111,176,255,.6);box-shadow:0 0 30px rgba(111,176,255,.25);transform:translate(-50%,-50%) scale(1.12)}
.ii{font-size:22px}.il{font-size:11px;color:#9fb0d6;margin-top:4px}.iv{font-size:16px;font-weight:700}
.bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:480px;display:flex;align-items:center;gap:12px;background:rgba(14,22,42,.85);border:1px solid rgba(120,160,255,.3);border-radius:14px;padding:11px 15px;z-index:6}
.bar input{flex:1;background:0;border:0;outline:0;color:#e6ecf8;font-size:14px}.bar input::placeholder{color:#6a78a0}
</style></head><body>
<div class="top"><div class="wm">JARVIS · CAROUSEL</div><div class="st">● ONLINE · OPUS</div></div>
<div class="stage"><div class="ring">
<div class="center"><div class="orb"></div><div class="cg">Good evening, <b>Shay</b></div><div class="cs">ROI 4.2× · spin to explore</div></div>
<div class="item act" style="left:50%;top:0"><div class="ii">⚠</div><div class="il">Needs you</div><div class="iv">3</div></div>
<div class="item" style="left:100%;top:25%"><div class="ii">◈</div><div class="il">Money</div><div class="iv">$3,840</div></div>
<div class="item" style="left:100%;top:75%"><div class="ii">⚇</div><div class="il">Agents</div><div class="iv">51</div></div>
<div class="item" style="left:50%;top:100%"><div class="ii">≋</div><div class="il">Jobs</div><div class="iv">2</div></div>
<div class="item" style="left:0;top:75%"><div class="ii">⊞</div><div class="il">Connectors</div><div class="iv">26</div></div>
<div class="item" style="left:0;top:25%"><div class="ii">✉</div><div class="il">Inbox</div><div class="iv">3</div></div>
</div></div>
<div class="bar"><span style="color:#6fb0ff">🎙</span><input placeholder="Ask Jarvis, or type a /command…"><span style="color:#6a78a0;font-size:12px">⌘K</span></div>
</body></html>
