<!doctype html><html><head><meta charset="utf-8"><title>T263</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}
body{height:100vh;overflow:hidden;color:#dde6f5;background:#04060f}
.top{display:flex;align-items:center;gap:14px;padding:22px 40px;position:relative;z-index:8}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#7f9cff}
.st{font-size:12px;color:#4a5a82}.r{margin-left:auto;font-size:13px;color:#6a7aa8}
.stage{position:absolute;inset:0;z-index:1}
.center{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:6;text-align:center}
.center .l{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7f9cff}
.center .v{font-size:56px;font-weight:800;background:linear-gradient(90deg,#fff,#7f9cff);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
.center .d{font-size:13px;color:#8a9ac8;margin-top:6px}
.wallL,.wallR{position:fixed;top:50%;transform:translateY(-50%);z-index:6;width:220px}
.wallL{left:36px}.wallR{right:36px;text-align:right}
.item{background:rgba(14,20,40,.5);border:1px solid rgba(127,156,255,.18);border-radius:10px;padding:9px 13px;margin-bottom:10px;backdrop-filter:blur(6px)}
.item .il{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#6a7aa8}
.item .iv{font-size:17px;font-weight:700;margin-top:1px}
.bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:480px;display:flex;align-items:center;gap:12px;background:rgba(8,12,26,.82);border:1px solid rgba(127,156,255,.24);border-radius:14px;padding:11px 15px;z-index:9;backdrop-filter:blur(8px)}
.bar input{flex:1;background:0;border:0;outline:0;color:#dde6f5;font-size:14px}.bar input::placeholder{color:#4a5a82}
</style></head><body>
