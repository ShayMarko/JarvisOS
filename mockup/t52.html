<!doctype html><html><head><meta charset="utf-8"><title>T52</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e7e9f6;background:radial-gradient(900px 800px at 50% 50%,#141633,#06070f)}
.top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:22px 34px;z-index:5}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#8b9bff}.st{font-size:12px;color:#6a72a8}
.cap{position:fixed;top:62px;left:34px;z-index:5}.cap h1{font-size:22px;font-weight:600}.cap h1 b{color:#8b9bff}.cap p{color:#6a72a8;font-size:13px;margin-top:3px}
.field{position:absolute;inset:0;display:grid;place-items:center}
.bubble{position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;box-shadow:0 10px 40px rgba(0,0,0,.4)}
.bn{font-size:13px;font-weight:600;padding:0 8px}.bv{font-size:12px;opacity:.85;margin-top:2px}
.bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:500px;display:flex;align-items:center;gap:12px;background:rgba(18,22,46,.85);border:1px solid rgba(139,155,255,.3);border-radius:14px;padding:11px 15px;z-index:5}
.bar input{flex:1;background:0;border:0;outline:0;color:#e7e9f6;font-size:14px}.bar input::placeholder{color:#6a72a8}
</style></head><body>
<div class="top"><div class="wm">JARVIS · PRODUCTS</div><div class="st">● ONLINE · OPUS</div></div>
<div class="cap"><h1>Good evening, <b>Shay</b>.</h1><p>products sized by revenue · tap to drill in</p></div>
<div class="field">
<div class="bubble" style="width:200px;height:200px;background:radial-gradient(circle at 40% 35%,#6fe0c0,#1d7a64);left:38%;top:34%"><div class="bn">Micro-API · weather</div><div class="bv">$1,240/mo</div></div>
<div class="bubble" style="width:160px;height:160px;background:radial-gradient(circle at 40% 35%,#8fb0ff,#2b4fae);left:60%;top:30%"><div class="bn">REST+auth kit</div><div class="bv">$890</div></div>
<div class="bubble" style="width:110px;height:110px;background:radial-gradient(circle at 40% 35%,#c79bff,#5a3fb0);left:30%;top:58%"><div class="bn">Newsletter</div><div class="bv">$400</div></div>
<div class="bubble" style="width:96px;height:96px;background:radial-gradient(circle at 40% 35%,#ffd27a,#b8862a);left:58%;top:60%"><div class="bn">SEO pack</div><div class="bv">$310</div></div>
<div class="bubble" style="width:70px;height:70px;background:radial-gradient(circle at 40% 35%,#ff9bb0,#a83a55);left:48%;top:18%"><div class="bn">POD</div><div class="bv">$90</div></div>
<div class="bubble" style="width:120px;height:120px;background:radial-gradient(circle at 40% 35%,#7fd0e0,#1d6a86);left:72%;top:56%"><div class="bn">habit-tracker</div><div class="bv">building</div></div>
</div>
<div class="bar"><span style="color:#8b9bff">🎙</span><input placeholder="Ask Jarvis, or type a /command…"><span style="color:#6a72a8;font-size:12px">⌘K</span></div>
</body></html>
