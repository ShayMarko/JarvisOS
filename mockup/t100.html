<!doctype html><html><head><meta charset="utf-8"><title>T100</title><style>
*{margin:0;box-sizing:border-box;font-family:'Helvetica Neue',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8eef2;background:#0b1016}
.top{display:flex;align-items:center;gap:14px;padding:18px 34px}
.wm{font-size:17px;font-weight:800;letter-spacing:3px;color:#5fd0c0}
.sub{font-size:12px;color:#5f7488}.r{margin-left:auto;font-size:12px;color:#5f7488}
.legend{display:flex;gap:20px;padding:2px 34px 8px;font-size:12px;color:#9aa6b2}
.legend i{display:inline-block;width:18px;height:4px;border-radius:2px;margin-right:7px;vertical-align:3px}
.map{height:calc(100vh - 92px);padding:0 20px}
svg{width:100%;height:100%}
.stn{font-size:12.5px;fill:#cdd6de;font-weight:600}
.stn.s{font-size:11px;fill:#8a98a6;font-weight:400}
.line-lbl{font-size:11px;font-weight:800;letter-spacing:1px}
.crit{fill:#ff8c8c;font-weight:800}
</style></head><body>
<div class="top"><div class="wm">JARVIS</div><div class="sub">workflow transit map · lines = money lanes · stations = steps</div><div class="r">● Online · Opus · 20:34 · Tue Jun 09</div></div>

<g>

<circle cx="1240" cy="480" r="9" fill="#8a98ff"/><text class="stn" x="1240" y="510" text-anchor="middle">Publish · Deploy</text>
</g>

<text class="line-lbl" x="60" y="154" fill="#46e0a0">N</text>

</svg>
</div>
</body></html>
