<!doctype html><html><head><meta charset="utf-8"><title>T182</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e6edf6;background:#080b11}
.top{display:flex;align-items:center;gap:14px;padding:22px 40px}

</style></head><body>
