<!doctype html><html><head><meta charset="utf-8"><title>T68</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#eaf1fb;background:#06070e}
.phone{position:relative;height:100vh;max-width:430px;margin:0 auto;overflow:hidden}
.sec{height:50vh;border-bottom:1px solid rgba(255,255,255,.06);padding:30px 28px;display:flex;flex-direction:column;justify-content:center;position:relative}
.s1{background:radial-gradient(600px 400px at 70% 10%,rgba(90,160,255,.25),transparent),linear-gradient(160deg,#0a1330,#06070e)}
.s2{background:radial-gradient(600px 400px at 20% 90%,rgba(255,90,140,.22),transparent),linear-gradient(160deg,#160a1c,#06070e)}
.k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8fa0c8;font-weight:600}
.greet{font-size:30px;font-weight:700;margin-top:8px}.greet b{color:#6cb0ff}
.p{font-size:14px;color:#aeb8d0;margin-top:8px;line-height:1.5}
.big{font-size:52px;font-weight:800;margin-top:4px}.big small{font-size:16px;color:#aeb8d0}
.rk{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;color:#ff6b81;background:rgba(255,107,129,.14)}
.h{font-size:22px;font-weight:700;margin-top:10px}
.go{margin-top:16px;align-self:flex-start;font-size:13px;font-weight:700;color:#06070e;background:linear-gradient(135deg,#6cb0ff,#9b8cff);border-radius:12px;padding:11px 18px}
.dots{position:absolute;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px}.dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25)}.dots .on{background:#6cb0ff;height:18px;border-radius:4px}
.scrollhint{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:12px;color:#6f7a98}
</style></head><body>
<div class="phone">
<div class="sec s1"><div class="dots"><span class="on"></span><span></span><span></span></div><div class="k">Good evening</div><div class="greet">Shay, <b>3 need you.</b></div><p class="p">Swipe down to handle each. 2 jobs are running, ROI 4.2× this month.</p></div>
<div class="sec s2"><span class="rk">CRITICAL</span><div class="h">Send invoice → 14 customers</div><p class="p">Drafted via Resend. One tap bills the month (~$1,240).</p><span class="go">Review &amp; approve →</span></div>
<div class="scrollhint">↑ scroll for more · say “Hey Jarvis”</div>
</div></body></html>
