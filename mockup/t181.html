<!doctype html><html><head><meta charset="utf-8"><title>T181</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e6edf6;background:radial-gradient(1100px 800px at 70% 30%,#0d1722,#070a10)}
.top{display:flex;align-items:center;gap:14px;padding:22px 40px}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#7cc4ff}.st{font-size:12px;color:#5f7488}.r{margin-left:auto;font-size:13px;color:#8a98a4}
.wrap{display:grid;grid-template-columns:1fr 360px;gap:0;height:calc(100vh - 90px);padding:0 40px}
.left{position:relative;display:flex;align-items:center;justify-content:center}
.hd{position:absolute;top:0;left:0}.hd h1{font-size:22px;font-weight:600}.hd h1 b{color:#7cc4ff}.hd p{font-size:13px;color:#5f7488;margin-top:4px}
.right{display:flex;flex-direction:column;justify-content:center;gap:10px;border-left:1px solid #18222e;padding-left:28px}
.right .k{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:#5f7488;margin-bottom:6px}
.row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #131c26}
.sw{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.row .nm{font-size:13px;flex:1}.row .vv{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.tot{margin-top:14px;font-size:28px;font-weight:800;letter-spacing:-1px}.tot span{font-size:12px;color:#5f7488;font-weight:500;letter-spacing:1px}
.bar{position:fixed;bottom:22px;left:40px;right:40px;display:flex;align-items:center;gap:12px;background:rgba(13,20,28,.85);border:1px solid #1b2632;border-radius:13px;padding:11px 15px}
.bar input{flex:1;background:0;border:0;outline:0;color:#e6edf6;font-size:14px}.bar input::placeholder{color:#5f7488}
</style></head><body>
<div class="top"><div class="wm">JARVIS · POLAR</div><div class="st">● ONLINE · OPUS · 20:34</div><div class="r">Revenue by source · Nightingale rose</div></div>
<div class="wrap">

<svg viewBox="0 0 520 520" style="width:min(520px,52vw);height:auto">

</defs>

<circle r="6" fill="#0a121c" stroke="#7cc4ff"/>

<text x="-70" y="-55" fill="#dff" font-size="13" font-weight="700" text-anchor="end">Lemon Sq</text>
<text x="-70" y="-37" fill="#ffe0a8" font-size="11" text-anchor="end">$310</text>
</g></svg>
</div>
<div class="right">

<div class="row"><span class="sw" style="background:#b48cff"></span><span class="nm">Newsletter</span><span class="vv">$400</span></div>

</body></html>
