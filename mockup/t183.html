<!doctype html><html><head><meta charset="utf-8"><title>T183</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e9eef6;background:#070910}
