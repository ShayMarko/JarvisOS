<!doctype html><html><head><meta charset="utf-8"><title>T76</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e6edf6;background:#0a0d14}
.top{display:flex;align-items:center;gap:14px;padding:20px 36px}.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#5fd0c0}.st{font-size:12px;color:#5f8278}.r{margin-left:auto;font-size:13px;color:#8a98a4}
.kpis{display:flex;gap:14px;padding:6px 36px}
.k{flex:1;background:#0e1419;border:1px solid #19232a;border-radius:14px;padding:14px 16px}
.kl{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:#5f8278}.kv{font-size:26px;font-weight:800;margin-top:5px}.kd{font-size:12px;margin-top:2px}.up{color:#46e0a0}
.chartwrap{margin:16px 36px;background:#0e1419;border:1px solid #19232a;border-radius:16px;padding:18px 10px 8px}
.cl{font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:#5f8278;padding:0 12px;display:flex;justify-content:space-between}
.legend span{font-size:12px;color:#9aa6ac;margin-left:14px}.dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px}
.bar{position:fixed;bottom:20px;left:36px;right:36px;display:flex;align-items:center;gap:12px;background:#0e1419;border:1px solid #19232a;border-radius:13px;padding:11px 15px}
.bar input{flex:1;background:0;border:0;outline:0;color:#e6edf6;font-size:14px}.bar input::placeholder{color:#5f8278}
</style></head><body>
<div class="top"><div class="wm">JARVIS · ANALYTICS</div><div class="st">● Opus</div><div class="r">Good evening, Shay · last 30 days</div></div>
<div class="kpis">
<div class="k"><div class="kl">Net · month</div><div class="kv">$3,840</div><div class="kd up">▲ 18%</div></div>
<div class="k"><div class="kl">ROI</div><div class="kv">4.2×</div><div class="kd up">▲ 0.4</div></div>
<div class="k"><div class="kl">Visitors</div><div class="kv">12.4k</div><div class="kd up">▲ 31%</div></div>
<div class="k"><div class="kl">Products live</div><div class="kv">7</div><div class="kd" style="color:#8a98a4">+2</div></div>
</div>
<div class="chartwrap"><div class="cl"><span>Revenue vs cost · daily</span><span class="legend"><span><span class="dot" style="background:#46e0a0"></span>revenue</span><span><span class="dot" style="background:#5fd0c0"></span>cumulative</span></span></div>
<svg viewBox="0 0 1200 320" style="width:100%;height:330px" preserveAspectRatio="none">
<defs><linearGradient id="a" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#46e0a0" stop-opacity=".35"/><stop offset="1" stop-color="#46e0a0" stop-opacity="0"/></linearGradient>
<linearGradient id="b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5fd0c0" stop-opacity=".22"/><stop offset="1" stop-color="#5fd0c0" stop-opacity="0"/></linearGradient></defs>
<g stroke="#16202400" /><g stroke="rgba(120,180,170,.08)"><line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/></g>
<path d="M0,300 L120,250 L240,270 L360,200 L480,220 L600,150 L720,170 L840,110 L960,130 L1080,70 L1200,40 L1200,320 L0,320 Z" fill="url(#b)"/>
<path d="M0,300 L120,250 L240,270 L360,200 L480,220 L600,150 L720,170 L840,110 L960,130 L1080,70 L1200,40" fill="none" stroke="#5fd0c0" stroke-width="2.5"/>
<path d="M0,290 L120,280 L240,250 L360,260 L480,210 L600,230 L720,180 L840,200 L960,150 L1080,170 L1200,120 L1200,320 L0,320 Z" fill="url(#a)"/>
<path d="M0,290 L120,280 L240,250 L360,260 L480,210 L600,230 L720,180 L840,200 L960,150 L1080,170 L1200,120" fill="none" stroke="#46e0a0" stroke-width="2.5"/>
</svg></div>
<div class="bar"><span style="color:#5fd0c0">🎙</span><input placeholder="Ask Jarvis about the numbers… · say “Hey Jarvis”"><span style="color:#5f8278;font-size:12px">⌘K</span></div>
</body></html>
