<!doctype html><html><head><meta charset="utf-8"><title>T159</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}
body{height:100vh;overflow:hidden;color:#fff;background:#0a0612}
.mesh{position:fixed;inset:0;filter:blur(70px);transform:scale(1.2)}
.b{position:absolute;border-radius:50%;mix-blend-mode:screen}
.b1{width:680px;height:680px;background:#ff4d8d;top:-160px;left:-120px}
.b2{width:620px;height:620px;background:#7c3aed;top:30%;left:36%}
.b3{width:560px;height:560px;background:#06b6d4;bottom:-180px;left:8%}
.b4{width:600px;height:600px;background:#f59e0b;top:-100px;right:-120px}
.b5{width:520px;height:520px;background:#10b981;bottom:-160px;right:-60px}
.grain{position:fixed;inset:0;opacity:.05;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:3px 3px}
.wrap{position:relative;z-index:2;height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 90px}
.top{position:absolute;top:42px;left:90px;right:90px;display:flex;justify-content:space-between;align-items:baseline}
.wm{font-size:14px;font-weight:800;letter-spacing:6px}
.st{font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.7)}
.glass{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);border-radius:28px;backdrop-filter:blur(24px);
  padding:46px 52px;max-width:880px;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.greet{font-size:46px;font-weight:300;letter-spacing:-1px;line-height:1.1}.greet b{font-weight:700}
.big{font-size:62px;font-weight:800;letter-spacing:-2px;margin:30px 0 2px;line-height:1}
.biglbl{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.75)}
.rows{display:grid;grid-template-columns:1fr 1fr;gap:14px 40px;margin-top:34px}
.li{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.14)}
.li .k{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6)}
.li b{font-weight:700}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px}
.bar{position:fixed;z-index:3;bottom:42px;left:50%;transform:translateX(-50%);width:660px;display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.24);border-radius:18px;backdrop-filter:blur(22px);padding:14px 18px}
.bar input{flex:1;background:0;border:0;outline:0;color:#fff;font-size:14px}.bar input::placeholder{color:rgba(255,255,255,.6)}
.bar .km{font-size:12px;color:rgba(255,255,255,.6)}
</style></head><body>
<div class="mesh"><div class="b b1"></div><div class="b b2"></div><div class="b b3"></div><div class="b b4"></div><div class="b b5"></div></div>
<div class="grain"></div>
<div class="top"><div class="wm">JARVIS</div><div class="st">● Online · Opus · 20:34 · Tue Jun 09</div></div>
<div class="wrap">
<div class="glass">
<div class="greet">Good evening, <b>Shay.</b></div>
<div class="big">$3,840 net <span style="font-size:24px;color:#7cffb0;font-weight:600">▲18%</span></div>
<div class="biglbl">ROI 4.2× · AI cost $58 / $80 budget</div>
<div class="rows">
<div class="li"><span><span class="dot" style="background:#ff4d8d"></span><span class="k">Critical</span> Send invoice → 14</span><b>$1,240</b></div>
<div class="li"><span><span class="k">habit-tracker</span> Code agent</span><b>72%</b></div>
<div class="li"><span><span class="dot" style="background:#f59e0b"></span><span class="k">High</span> Publish SaaS starter</span><b>$39</b></div>
<div class="li"><span><span class="k">research niche</span> Scout</span><b>40%</b></div>
<div class="li"><span><span class="dot" style="background:#f59e0b"></span><span class="k">High</span> Deploy micro-API</span><b>·</b></div>
<div class="li"><span><span class="k">System</span> 51 agents · 9 live</span><b>7 live</b></div>
</div>
</div>
</div>
<div class="bar">🎙<input placeholder="Ask Jarvis, or type a /command…"><span class="km">⌘K</span></div>
</body></html>
