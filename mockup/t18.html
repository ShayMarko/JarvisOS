<!doctype html><html><head><meta charset="utf-8"><title>T18</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8e2ff;background:radial-gradient(1200px 900px at 60% 40%,#160f33,#070512)}
.top{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:22px 34px;z-index:5}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#b9a6ff}
.st{font-size:12px;letter-spacing:2px;color:#7c6fb0}
.cap{position:fixed;top:64px;left:34px;z-index:5}.cap h1{font-size:24px;font-weight:600}.cap h1 b{color:#b9a6ff}.cap p{color:#8a7fc0;font-size:13px;margin-top:3px}
svg{position:fixed;inset:0}
.star{fill:#fff;opacity:.5}
.pin text{font-size:12px;fill:#d8d0ff;font-family:Inter,sans-serif}
.pin .sub{fill:#8a7fc0;font-size:10px}
.bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:520px;display:flex;align-items:center;gap:12px;background:rgba(20,14,44,.8);border:1px solid rgba(150,130,230,.3);border-radius:14px;padding:11px 15px;z-index:5}
.bar input{flex:1;background:0;border:0;outline:0;color:#e8e2ff;font-size:14px}.bar input::placeholder{color:#6a5fa0}
</style></head><body>
<div class="top"><div class="wm">JARVIS · CONSTELLATION</div><div class="st">● ONLINE · OPUS</div></div>
<div class="cap"><h1>Good evening, <b>Shay</b>.</h1><p>Your universe — 3 need you · 2 jobs · ROI 4.2×</p></div>
<svg viewBox="0 0 1380 860" preserveAspectRatio="xMidYMid slice">
<g class="star"><circle cx="200" cy="120" r="1.5"/><circle cx="500" cy="80" r="1"/><circle cx="900" cy="140" r="1.5"/><circle cx="1200" cy="90" r="1"/><circle cx="300" cy="700" r="1.5"/><circle cx="1100" cy="760" r="1"/><circle cx="760" cy="780" r="1.5"/><circle cx="120" cy="420" r="1"/><circle cx="1280" cy="500" r="1.5"/><circle cx="640" cy="200" r="1"/></g>
<g stroke="rgba(150,130,230,.25)" stroke-width="1" fill="none">
<path d="M690,430 L420,250"/><path d="M690,430 L960,250"/><path d="M690,430 L320,560"/><path d="M690,430 L1040,560"/><path d="M690,430 L690,680"/><path d="M420,250 L320,560"/><path d="M960,250 L1040,560"/></g>
<defs><radialGradient id="sun" cx="50%" cy="40%"><stop offset="0" stop-color="#fff"/><stop offset="45%" stop-color="#b9a6ff"/><stop offset="100%" stop-color="#5a3fb0"/></radialGradient></defs>
<circle cx="690" cy="430" r="40" fill="url(#sun)" style="filter:drop-shadow(0 0 30px rgba(150,130,230,.7))"/>
<text x="690" y="495" text-anchor="middle" style="font-size:13px;fill:#d8d0ff;font-family:Inter">Jarvis · Opus</text>
<g class="pin">
<circle cx="420" cy="250" r="20" fill="#1a1240" stroke="#9b8cff" stroke-width="1.5"/><text x="420" y="218" text-anchor="middle">Money</text><text x="420" y="232" text-anchor="middle" class="sub">$3,840 · 4.2×</text>
<circle cx="960" cy="250" r="20" fill="#1a1240" stroke="#9b8cff" stroke-width="1.5"/><text x="960" y="218" text-anchor="middle">Needs you</text><text x="960" y="232" text-anchor="middle" class="sub">3 pending</text>
<circle cx="320" cy="560" r="20" fill="#1a1240" stroke="#8cb8ff" stroke-width="1.5"/><text x="320" y="600" text-anchor="middle">Agents · 51</text>
<circle cx="1040" cy="560" r="20" fill="#1a1240" stroke="#8cb8ff" stroke-width="1.5"/><text x="1040" y="600" text-anchor="middle">Connectors · 26</text>
<circle cx="690" cy="680" r="20" fill="#1a1240" stroke="#ff9bd6" stroke-width="1.5"/><text x="690" y="720" text-anchor="middle">Jobs · 2 running</text>
</g></svg>
<div class="bar"><span style="color:#b9a6ff">🎙</span><input placeholder="Ask Jarvis, or type a /command…"><span style="color:#6a5fa0;font-size:12px">⌘K</span></div>
</body></html>
