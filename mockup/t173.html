<!doctype html><html><head><meta charset="utf-8"><title>T173</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;background:#000;color:#3a4a44;display:flex;align-items:center;justify-content:center}
.aod{width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000}
.wm{font-size:13px;font-weight:700;letter-spacing:6px;color:#1f4a40}
.clock{font-size:150px;font-weight:200;letter-spacing:-4px;color:#2e5a50;line-height:1;margin:14px 0;font-variant-numeric:tabular-nums;text-shadow:0 0 30px rgba(46,90,80,.18)}
.date{font-size:15px;letter-spacing:4px;text-transform:uppercase;color:#244a42}
.stats{display:flex;gap:64px;margin-top:54px}
.stat{text-align:center}
.stat .v{font-size:32px;font-weight:300;color:#2a6e5e;letter-spacing:-1px}
.stat .l{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#1c4439;margin-top:6px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#2a6e5e;margin-right:6px;vertical-align:middle;box-shadow:0 0 6px #2a6e5e}
.alert{margin-top:50px;font-size:12px;letter-spacing:1px;color:#5a4030;display:flex;align-items:center;gap:8px}
.adot{width:6px;height:6px;border-radius:50%;background:#7a4a2a;box-shadow:0 0 6px #7a4a2a}
</style></head><body>
<div class="aod">
<div class="wm">JARVIS</div>
<div class="clock">20:34</div>
<div class="date">Tue · Jun 09</div>
<div class="stats">
<div class="stat"><div class="v"><span class="dot"></span>$3,840</div><div class="l">Net · month</div></div>
<div class="stat"><div class="v">2</div><div class="l">Jobs running</div></div>
</div>
<div class="alert"><span class="adot"></span>3 things need you</div>
</div>
</body></html>
