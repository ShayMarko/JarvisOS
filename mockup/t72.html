<!doctype html><html><head><meta charset="utf-8"><title>T72</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8edf8;background:radial-gradient(900px 700px at 80% 80%,#181f3e,#070912)}
.top{display:flex;align-items:center;gap:14px;padding:24px 36px}.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#7aa0ff}.st{font-size:12px;color:#6a73a0}
.head{padding:8px 36px}.h1{font-size:28px;font-weight:700}.h1 b{color:#7aa0ff}.sub{color:#8a93b8;font-size:14px;margin-top:5px}
.cards{display:flex;gap:16px;padding:18px 36px;flex-wrap:wrap}
.c{background:rgba(20,26,48,.6);border:1px solid rgba(130,150,220,.16);border-radius:18px;padding:18px;min-width:220px}
.cl{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:#6a73a0}.big{font-size:30px;font-weight:800;margin-top:8px}.d{font-size:13px;color:#9aa3c0;margin-top:4px}
.fabwrap{position:fixed;right:46px;bottom:46px;width:300px;height:300px}
.petal{position:absolute;right:8px;bottom:8px;display:flex;align-items:center;gap:8px;background:rgba(24,30,56,.92);border:1px solid rgba(130,150,220,.3);border-radius:99px;padding:9px 15px 9px 9px;box-shadow:0 10px 26px rgba(0,0,0,.4);backdrop-filter:blur(8px)}
.petal .pi{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:16px;background:rgba(122,160,255,.18)}
.petal .pl{font-size:13px;font-weight:600;white-space:nowrap}
.fab{position:absolute;right:0;bottom:0;width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#7aa0ff,#b08bff);display:grid;place-items:center;color:#070912;font-size:30px;box-shadow:0 0 30px rgba(122,160,255,.5);z-index:2}
.bar{position:fixed;bottom:30px;left:36px;width:520px;display:flex;align-items:center;gap:12px;background:rgba(20,26,48,.8);border:1px solid rgba(130,150,220,.25);border-radius:14px;padding:11px 15px}
.bar input{flex:1;background:0;border:0;outline:0;color:#e8edf8;font-size:14px}.bar input::placeholder{color:#6a73a0}
</style></head><body>
<div class="top"><div class="wm">JARVIS</div><div class="st">● Online · Opus</div></div>
<div class="head"><div class="h1">Good evening, <b>Shay</b>.</div><div class="sub">3 need you · 2 jobs · ROI 4.2× — tap ＋ for quick actions</div></div>
<div class="cards">
<div class="c"><div class="cl">Needs you</div><div class="big">3</div><div class="d">invoice · publish · deploy</div></div>
<div class="c"><div class="cl">Money · month</div><div class="big">$3,840</div><div class="d">▲18% · ROI 4.2×</div></div>
<div class="c"><div class="cl">Jobs</div><div class="big">2</div><div class="d">habit-tracker 72%</div></div>
</div>
<div class="fabwrap">
<div class="petal" style="transform:translate(0,-200px)"><div class="pi">⛔</div><div class="pl">Approve invoice</div></div>
<div class="petal" style="transform:translate(-70px,-150px)"><div class="pi">✦</div><div class="pl">New chat</div></div>
<div class="petal" style="transform:translate(-130px,-78px)"><div class="pi">≋</div><div class="pl">Run a job</div></div>
<div class="fab">＋</div>
</div>
<div class="bar"><span style="color:#7aa0ff">🎙</span><input placeholder="Ask Jarvis… · say “Hey Jarvis”"><span style="color:#6a73a0;font-size:12px">⌘K</span></div>
</body></html>
