<!doctype html><html><head><meta charset="utf-8"><title>T22</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e6edf8;background:radial-gradient(1100px 700px at 50% 20%,#16203c,#06080f)}
.top{position:fixed;top:22px;left:0;right:0;text-align:center;font-size:12px;letter-spacing:3px;color:#7e8db0}
.spot{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:620px;max-width:88vw;text-align:center}
.greet{font-size:30px;font-weight:300;margin-bottom:20px}.greet b{color:#6cc6ff;font-weight:600}
.field{display:flex;align-items:center;gap:14px;background:rgba(16,24,44,.85);border:1px solid rgba(110,170,255,.3);border-radius:18px;padding:16px 20px;box-shadow:0 30px 80px rgba(0,0,0,.5);backdrop-filter:blur(16px)}
.field input{flex:1;background:0;border:0;outline:0;color:#e6edf8;font-size:17px}.field input::placeholder{color:#5d6f92}
.sugg{margin-top:14px;text-align:left;background:rgba(14,20,38,.7);border:1px solid rgba(110,170,255,.15);border-radius:14px;overflow:hidden}
.srow{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(110,170,255,.08);font-size:14px}.srow:last-child{border:0}
.srow .i{width:26px;text-align:center}.srow .m{margin-left:auto;font-size:12px;color:#7e8db0}
.dock{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:rgba(16,24,44,.7);border:1px solid rgba(110,170,255,.2);border-radius:20px;padding:10px 14px;backdrop-filter:blur(12px)}
.dap{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:20px;background:rgba(30,42,70,.7);border:1px solid rgba(110,170,255,.15)}
.dap.on{background:linear-gradient(135deg,#5fb6ff,#9b8cff);color:#06121f}
.badge{position:relative}.badge::after{content:"3";position:absolute;top:-3px;right:-3px;background:#ff6b81;color:#fff;font-size:10px;width:16px;height:16px;border-radius:50%;display:grid;place-items:center}
</style></head><body>
<div class="top">J · A · R · V · I · S &nbsp;·&nbsp; ● ONLINE · OPUS &nbsp;·&nbsp; 20:34</div>
<div class="spot">
<div class="greet">Good evening, <b>Shay</b>.</div>
<div class="field"><span style="color:#6cc6ff;font-size:18px">⌕</span><input placeholder="Ask, command, or search anything…"><span style="font-size:12px;color:#5d6f92;border:1px solid rgba(110,170,255,.25);border-radius:6px;padding:3px 8px">⌘K</span></div>
<div class="sugg">
<div class="srow"><span class="i">⛔</span>Approve: invoice → 14 customers<span class="m">critical</span></div>
<div class="srow"><span class="i">◈</span>Show this month's money<span class="m">$3,840 · 4.2×</span></div>
<div class="srow"><span class="i">≋</span>Resume: build habit-tracker<span class="m">72%</span></div>
<div class="srow"><span class="i">✉</span>Draft replies (3 waiting)<span class="m">EA</span></div>
</div></div>
<div class="dock"><div class="dap on">⌂</div><div class="dap">✦</div><div class="dap">⚇</div><div class="dap">◈</div><div class="dap badge">🔔</div><div class="dap">⚙</div></div>
</body></html>
