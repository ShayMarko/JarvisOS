<!doctype html><html><head><meta charset="utf-8"><title>T271</title><style>
*{margin:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
body{height:100vh;overflow:hidden;background:#0c0f14;display:flex;align-items:center;justify-content:center}
/* Nest-Hub style: rounded-rect display floating on a fabric base */
.unit{width:1180px;height:720px;border-radius:40px;position:relative;background:linear-gradient(160deg,#16243e 0%,#101a30 55%,#0c1326 100%);box-shadow:0 40px 90px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.07);overflow:hidden;border:1px solid rgba(120,160,220,.16)}
.unit::before{content:"";position:absolute;inset:0;background:radial-gradient(70% 60% at 78% 14%,rgba(90,160,255,.22),transparent 60%)}
.base{position:absolute;left:50%;bottom:-36px;transform:translateX(-50%);width:760px;height:64px;border-radius:36px;background:linear-gradient(#3a4250,#252b36);box-shadow:0 18px 40px rgba(0,0,0,.5)}
.top{position:absolute;top:34px;left:44px;right:44px;display:flex;align-items:center;justify-content:space-between;color:#9fb6d6;font-size:14px;letter-spacing:1px}
.top .wm{font-weight:800;letter-spacing:4px;color:#bcd4f4}
.time{position:absolute;top:96px;left:44px;color:#eef4fc}
.time .h{font-size:120px;font-weight:200;letter-spacing:-5px;line-height:.85}
.time .d{font-size:22px;color:#9fb6d6;margin-top:6px;font-weight:300}
.greet{position:absolute;top:120px;right:44px;text-align:right;color:#cfe0f6}
.greet .g{font-size:24px;font-weight:300}.greet .g b{font-weight:600}
.greet .net{font-size:38px;font-weight:300;margin-top:6px}.greet .net b{color:#5fdca6;font-size:18px;font-weight:600}
/* one big card */
.card{position:absolute;left:44px;right:44px;bottom:96px;background:rgba(8,16,30,.6);backdrop-filter:blur(10px);border:1px solid rgba(140,180,255,.2);border-radius:26px;padding:26px 30px;display:flex;align-items:center;gap:26px}
.card .ic{width:74px;height:74px;border-radius:20px;background:linear-gradient(135deg,#ff5d73,#ff8a4a);display:flex;align-items:center;justify-content:center;font-size:34px;flex:none;box-shadow:0 0 26px rgba(255,93,115,.45)}
.card .lb{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#ff8a9a;font-weight:700}
.card h2{font-size:30px;font-weight:600;margin-top:4px;color:#fff}
.card p{font-size:15px;color:#9fb6d6;margin-top:4px}
.card .act{margin-left:auto;display:flex;gap:12px}
.btn{font-size:15px;font-weight:700;padding:14px 28px;border-radius:16px}
.btn.go{background:#5fdca6;color:#062018}.btn.gh{background:rgba(255,255,255,.08);color:#cfe0f6}
.voice{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;font-size:15px;color:#7e95b6}
.wave{display:flex;align-items:center;gap:4px}.wave i{width:4px;border-radius:2px;background:#5aaaff}
.wave i:nth-child(1){height:10px}.wave i:nth-child(2){height:20px}.wave i:nth-child(3){height:30px}.wave i:nth-child(4){height:18px}.wave i:nth-child(5){height:9px}
</style></head><body>
<div class="unit">
<div class="top"><span class="wm">JARVIS</span><span>● Online · Opus · ☁ 18° · 🔆</span></div>
<div class="time"><div class="h">20:34</div><div class="d">Tuesday, June 09</div></div>
<div class="greet"><div class="g">Good evening, <b>Shay.</b></div><div class="net">$3,840 <b>▲18%</b> net · ROI 4.2×</div></div>
<div class="card"><div class="ic">⚠️</div><div><div class="lb">Needs you · Critical</div><h2>Send invoice → 14 customers</h2><p>EA drafted via Resend · estimated $1,240 · 2 more tasks waiting</p></div><div class="act"><span class="btn gh">Later</span><span class="btn go">Approve</span></div></div>
<div class="voice"><span class="wave"><i></i><i></i><i></i><i></i><i></i></span>“Hey Jarvis” — try “read my money”</div>
<div class="base"></div>
</div>
</body></html>
