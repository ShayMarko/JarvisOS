<!doctype html><html><head><meta charset="utf-8"><title>T205</title><style>
*{margin:0;box-sizing:border-box;font-family:ui-monospace,'SF Mono',monospace}
body{height:100vh;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}
.wrist{width:560px;height:560px;border-radius:34px;background:radial-gradient(circle at 40% 30%,#0a1014,#000);border:14px solid #0e1418;box-shadow:0 0 0 6px #05080a,0 30px 80px rgba(0,0,0,.8);padding:30px;display:flex;flex-direction:column;color:#00e0c0}
.head{display:flex;justify-content:space-between;align-items:center}
.wm{font-size:14px;font-weight:800;letter-spacing:3px;color:#00e0c0;text-shadow:0 0 12px rgba(0,224,192,.6)}
.mode{font-size:10px;color:#ffce6a;letter-spacing:2px;border:1px solid #4a3a14;border-radius:5px;padding:3px 8px}
.main{flex:1;display:flex;align-items:center;justify-content:center;gap:28px}
.bigwrap{text-align:center}
.biglabel{font-size:11px;color:#0a8a78;letter-spacing:3px}
.big{font-size:120px;font-weight:800;line-height:.9;color:#00e0c0;text-shadow:0 0 24px rgba(0,224,192,.6)}
.bigunit{font-size:20px;color:#0a8a78}
.gaugeR{position:relative;width:180px;height:180px}
.gtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gtv{font-size:30px;font-weight:800;color:#ffce6a;text-shadow:0 0 14px rgba(255,206,106,.5)}
.gtl{font-size:9px;color:#0a8a78;letter-spacing:2px;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:6px}
.cell{border:1px solid #0d2a26;border-radius:10px;padding:12px;text-align:center;background:#04100e}
.cl{font-size:9px;color:#0a8a78;letter-spacing:2px}.cv{font-size:24px;font-weight:800;margin-top:4px}
.cv.w{color:#ffce6a}.cv.r{color:#ff6a6a;text-shadow:0 0 12px rgba(255,106,106,.5)}.cv.c{color:#00e0c0}
.foot{margin-top:14px;text-align:center;font-size:10px;color:#0a8a78;letter-spacing:2px}
</style></head><body>
<div class="wrist">
<div class="head"><div class="wm">JARVIS·DIVE</div><div class="mode">AUTONOMOUS · NO-DECO</div></div>
<div class="main">
<div class="bigwrap"><div class="biglabel">CURRENT DEPTH · AI BUDGET USED</div><div class="big">58</div><div class="bigunit">/ 80 budget · 73%</div></div>
<div class="gaugeR"><svg width="180" height="180" viewBox="0 0 180 180"><circle cx="90" cy="90" r="76" fill="none" stroke="#0d2a26" stroke-width="12"/><circle cx="90" cy="90" r="76" fill="none" stroke="#ffce6a" stroke-width="12" stroke-linecap="round" stroke-dasharray="349 478" transform="rotate(-90 90 90)"/></svg><div class="gtxt"><div class="gtv">22m</div><div class="gtl">NO-DECO · safe spend left</div></div></div>
</div>
<div class="grid">
<div class="cell"><div class="cl">NET / MO</div><div class="cv c">$3.8k</div></div>
<div class="cell"><div class="cl">ROI</div><div class="cv c">4.2×</div></div>
<div class="cell"><div class="cl">JOBS</div><div class="cv w">72%</div></div>
<div class="cell"><div class="cl">NEED YOU</div><div class="cv r">3</div></div>
</div>
<div class="foot">● ONLINE · OPUS · 20:34 TUE JUN 09 · ASCENT RATE NOMINAL · 51 AGENTS · 9 CONNECTORS LIVE</div>
</div>
</body></html>
