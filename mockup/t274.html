<!doctype html><html><head><meta charset="utf-8"><title>T274</title><style>
*{margin:0;box-sizing:border-box;font-family:'Georgia','Times New Roman',serif}
body{height:100vh;overflow:hidden;background:#1a1a1d;display:flex;align-items:center;justify-content:center}
/* wooden/dark frame around an ambient image */
.frame{width:1180px;height:740px;border-radius:8px;background:linear-gradient(135deg,#2a2622,#1c1916);padding:26px;box-shadow:0 40px 90px rgba(0,0,0,.7),inset 0 0 0 2px #0c0a08}
.mat{width:100%;height:100%;border-radius:3px;overflow:hidden;position:relative;background:
 radial-gradient(120% 90% at 30% 20%,#243a52 0%,#15233a 45%,#0a1322 100%)}
/* ambient soft gradient bloom */
.bloom{position:absolute;inset:0;background:
 radial-gradient(40% 50% at 78% 30%,rgba(255,170,120,.28),transparent 60%),
 radial-gradient(45% 45% at 20% 80%,rgba(90,150,255,.22),transparent 65%)}
.grain{position:absolute;inset:0;opacity:.05;background-image:radial-gradient(rgba(255,255,255,.6) 1px,transparent 1px);background-size:4px 4px}
.content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;color:#f4ece0}
.kicker{font-family:system-ui,sans-serif;font-size:12px;letter-spacing:5px;text-transform:uppercase;color:#e8b48a;opacity:.9}
.huge{font-size:150px;font-weight:400;letter-spacing:-4px;line-height:.9;margin:10px 0 4px;text-shadow:0 4px 30px rgba(0,0,0,.5)}
.huge b{font-style:italic;color:#ffd9a8}
.sub{font-size:24px;color:#cdd6e0;font-style:italic}
.line{width:90px;height:1px;background:rgba(255,255,255,.3);margin:26px 0}
.caption{font-family:system-ui,sans-serif;font-size:14px;letter-spacing:1px;color:#b9c4d0;max-width:560px;line-height:1.55}
.caption b{color:#ffd9a8;font-weight:600}
.foot{position:absolute;left:0;right:0;bottom:24px;display:flex;justify-content:space-between;padding:0 30px;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:2px;color:#8896a4}
.dots{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:7px}
.dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}.dots i.on{background:#ffd9a8}
</style></head><body>
<div class="frame"><div class="mat">
<div class="bloom"></div><div class="grain"></div>
<div class="content">
<div class="kicker">This month · with Jarvis</div>
<div class="huge">$3,840 <b>↑</b></div>
<div class="sub">net earned · ROI 4.2× · up 18%</div>
<div class="line"></div>
<div class="caption">Quietly, in the background, <b>51 agents</b> shipped <b>7 products</b> and kept watch over <b>26 connectors</b>. A good evening, Shay.</div>
</div>
<div class="foot"><span>JARVIS</span><span>TUE · JUN 09 · 20:34</span></div>
<div class="dots"><i></i><i class="on"></i><i></i><i></i><i></i></div>
</div></div>
</body></html>
