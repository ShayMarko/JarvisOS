<!doctype html><html><head><meta charset="utf-8"><title>T48</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8edf5;background:#080a10}
.band{display:flex;align-items:center;padding:0 44px;height:calc((100vh - 70px)/4);border-bottom:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden}
.band .glow{position:absolute;right:-60px;top:50%;transform:translateY(-50%);width:300px;height:300px;border-radius:50%;filter:blur(60px);opacity:.5}
.k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7e8aa6;width:160px;flex:none}
.b1{background:linear-gradient(90deg,#0d1426,#080a10)}.b1 .glow{background:#2b6fff}
.b2{background:linear-gradient(90deg,#1a0f1e,#080a10)}.b2 .glow{background:#ff5e9c}
.b3{background:linear-gradient(90deg,#0a1a16,#080a10)}.b3 .glow{background:#1fd6a0}
.b4{background:linear-gradient(90deg,#161226,#080a10)}.b4 .glow{background:#9b6cff}
.content{flex:1;display:flex;align-items:center;gap:24px;z-index:2}
.wm{font-size:17px;font-weight:800;letter-spacing:3px}.big{font-size:38px;font-weight:800}.big small{font-size:14px;color:#9fb0d0}
.h{font-size:21px;font-weight:700}.d{font-size:13px;color:#9aa6c0}
.rk{font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(255,94,156,.25)}
.go{font-size:12px;font-weight:700;color:#080a10;background:#fff;border-radius:9px;padding:8px 14px}
.bar2{height:7px;width:220px;border-radius:7px;background:rgba(255,255,255,.14)}.bar2 i{display:block;height:100%;border-radius:7px;background:#9b6cff}
.dock{height:70px;display:flex;align-items:center;padding:0 44px}
.cmd{flex:1;display:flex;align-items:center;gap:12px;background:#0e131e;border:1px solid #1c2332;border-radius:13px;padding:10px 16px}
.cmd input{flex:1;background:0;border:0;outline:0;color:#e8edf5;font-size:14px}.cmd input::placeholder{color:#5d6884}
</style></head><body>
<div class="band b1"><div class="glow"></div><div class="k">JARVIS · evening</div><div class="content"><div class="wm">Good evening, Shay.</div><div class="d">● Online · Opus · 3 need you · 2 jobs · ROI 4.2×</div></div></div>
<div class="band b2"><div class="glow"></div><div class="k">Needs you · crit</div><div class="content"><span class="rk">CRITICAL</span><div class="h">Send invoice → 14 customers</div><div class="go" style="margin-left:auto">Approve</div></div></div>
<div class="band b3"><div class="glow"></div><div class="k">Money · month</div><div class="content"><div class="big">$3,840 <small>net · ▲18% · ROI 4.2×</small></div></div></div>
<div class="band b4"><div class="glow"></div><div class="k">Job · building</div><div class="content"><div class="h" style="font-size:17px">habit-tracker</div><div class="bar2"><i style="width:72%"></i></div><div class="d">72% · Code agent</div></div></div>
<div class="dock"><div class="cmd"><span style="color:#9b6cff">🎙</span><input placeholder="Ask Jarvis, or type a /command… · say “Hey Jarvis”"><span style="color:#5d6884;font-size:12px">⌘K</span></div></div>
</body></html>
