<!doctype html><html><head><meta charset="utf-8"><title>T40</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;background:#000;color:#eef2f8;display:flex;flex-direction:column}
.bar-top,.bar-bot{height:90px;background:#000;flex:none}
.stage{flex:1;position:relative;background:radial-gradient(1200px 600px at 50% 50%,#0c1a2e,#04070d);display:flex;align-items:center;padding:0 80px;overflow:hidden}
.orbglow{position:absolute;right:8%;top:50%;transform:translateY(-50%);width:360px;height:360px;border-radius:50%;background:radial-gradient(circle at 50% 40%,rgba(120,200,255,.5),rgba(40,100,200,.15) 55%,transparent 72%)}
.orb{position:absolute;right:18%;top:50%;transform:translateY(-50%);width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#eaffff,#6cc6ff 45%,#1d5fae);box-shadow:0 0 80px rgba(108,198,255,.6)}
.wm{position:absolute;top:24px;left:80px;font-size:13px;letter-spacing:5px;color:#7fb0e0}
.k{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#6f9ccb}
.huge{font-size:64px;font-weight:300;line-height:1.05;margin:10px 0;max-width:640px}.huge b{font-weight:700;background:linear-gradient(135deg,#9fe0ff,#6c9bff);-webkit-background-clip:text;color:transparent}
.line{font-size:16px;color:#9fb4d4;max-width:520px}
.stats{display:flex;gap:40px;margin-top:26px}.stat .v{font-size:24px;font-weight:700}.stat .v.c{color:#6cc6ff}.stat .l{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#6f86ad}
.bar-bot{display:flex;align-items:center;padding:0 80px}
.cmd{flex:1;display:flex;align-items:center;gap:12px;border:1px solid rgba(120,170,230,.25);border-radius:14px;padding:11px 16px;background:rgba(10,18,32,.6)}
.cmd input{flex:1;background:0;border:0;outline:0;color:#eef2f8;font-size:15px}.cmd input::placeholder{color:#5d6f92}
</style></head><body>
<div class="bar-top"></div>
<div class="stage"><div class="wm">J · A · R · V · I · S &nbsp;·&nbsp; ● ONLINE · OPUS</div>
<div class="orbglow"></div><div class="orb"></div>
<div><div class="k">Good evening</div><div class="huge">Shay,<br>here's <b>what matters.</b></div>
<div class="line">3 things need you, 2 jobs are running, and you've earned 4.2× what I cost this month.</div>
<div class="stats"><div class="stat"><div class="v c">$3,840</div><div class="l">net · month</div></div><div class="stat"><div class="v">3</div><div class="l">need you</div></div><div class="stat"><div class="v">2</div><div class="l">jobs</div></div></div></div>
</div>
<div class="bar-bot"><div class="cmd"><span style="color:#6cc6ff">🎙</span><input placeholder="Ask Jarvis, or type a /command… · say “Hey Jarvis”"><span style="color:#5d6f92;font-size:12px">⌘K</span></div></div>
</body></html>
