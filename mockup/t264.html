<!doctype html><html><head><meta charset="utf-8"><title>T264</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}
body{height:100vh;overflow:hidden;color:#d8e6f0;background:radial-gradient(1100px 900px at 60% 30%,#0c1626,#060b14 78%)}
.top{display:flex;align-items:center;gap:14px;padding:22px 40px;position:relative;z-index:5}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#7fd0e6}
.st{font-size:12px;color:#456a7c}.r{margin-left:auto;font-size:13px;color:#5f8a9c}
.cap{padding:0 40px;position:relative;z-index:5}
.cap h1{font-size:24px;font-weight:600}.cap h1 b{color:#9fe0f0}
.cap p{color:#5f8a9c;font-size:13px;margin-top:3px}
.field{position:absolute;inset:0;z-index:1}
.lbl{position:fixed;z-index:6;text-align:center}
.lbl .v{font-size:24px;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.5)}
.lbl .l{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#9fc0d0;margin-top:1px}
.bar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:520px;display:flex;align-items:center;gap:12px;background:rgba(8,16,24,.8);border:1px solid rgba(127,208,230,.24);border-radius:14px;padding:11px 15px;z-index:7;backdrop-filter:blur(8px)}
.bar input{flex:1;background:0;border:0;outline:0;color:#d8e6f0;font-size:14px}.bar input::placeholder{color:#456a7c}
</style></head><body>
<div class="top"><div class="wm">JARVIS · CRYSTAL</div><div class="st">● Online · Opus · 20:34</div><div class="r">low-poly · faceted data gems</div></div>
<div class="cap"><h1>Your month, cut like <b>crystal</b>, Shay.</h1><p>Each gem is a metric — bigger facets, bigger value. Cool and quiet tonight.</p></div>
<svg class="field" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
<defs>
<linearGradient id="c1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3fd0e0"/><stop offset="100%" stop-color="#1a6a8a"/></linearGradient>
<linearGradient id="c2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7f9cff"/><stop offset="100%" stop-color="#3a4a9a"/></linearGradient>
<linearGradient id="c3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#aa8cff"/><stop offset="100%" stop-color="#5a3a9a"/></linearGradient>
<linearGradient id="c4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5fe0c0"/><stop offset="100%" stop-color="#2a8a6a"/></linearGradient>
</defs>
<!-- big crystal (net) -->
<g transform="translate(720,420)">
<polygon points="0,-170 130,-50 90,150 -90,150 -130,-50" fill="url(#c1)" opacity=".25"/>
<polygon points="0,-170 130,-50 0,20" fill="#5fe0f0" opacity=".5"/>
<polygon points="0,-170 -130,-50 0,20" fill="#3fc0e0" opacity=".38"/>
<polygon points="130,-50 90,150 0,20" fill="#2fa0c8" opacity=".42"/>
<polygon points="-130,-50 -90,150 0,20" fill="#3fb0d8" opacity=".3"/>
<polygon points="90,150 -90,150 0,20" fill="#1a7a9a" opacity=".5"/>
<polygon points="0,-170 130,-50 90,150 -90,150 -130,-50" fill="none" stroke="rgba(180,240,255,.5)" stroke-width="1.2"/>
<line x1="0" y1="-170" x2="0" y2="20" stroke="rgba(180,240,255,.35)"/><line x1="130" y1="-50" x2="0" y2="20" stroke="rgba(180,240,255,.3)"/><line x1="-130" y1="-50" x2="0" y2="20" stroke="rgba(180,240,255,.3)"/><line x1="90" y1="150" x2="0" y2="20" stroke="rgba(180,240,255,.3)"/><line x1="-90" y1="150" x2="0" y2="20" stroke="rgba(180,240,255,.3)"/>
</g>
<!-- gem 2 (ROI) -->
<g transform="translate(330,330)">
<polygon points="0,-90 70,-20 45,90 -45,90 -70,-20" fill="url(#c2)" opacity=".3"/>
<polygon points="0,-90 70,-20 0,10" fill="#9ab0ff" opacity=".45"/><polygon points="0,-90 -70,-20 0,10" fill="#7f9cff" opacity=".35"/>
<polygon points="70,-20 45,90 0,10" fill="#5a6ad0" opacity=".4"/><polygon points="-70,-20 -45,90 0,10" fill="#6a7ae0" opacity=".3"/><polygon points="45,90 -45,90 0,10" fill="#3a4a9a" opacity=".5"/>
<polygon points="0,-90 70,-20 45,90 -45,90 -70,-20" fill="none" stroke="rgba(180,200,255,.5)" stroke-width="1.1"/>
</g>
<!-- gem 3 (cost) -->
<g transform="translate(1080,300)">
<polygon points="0,-80 62,-16 40,82 -40,82 -62,-16" fill="url(#c3)" opacity=".3"/>
<polygon points="0,-80 62,-16 0,8" fill="#c5a8ff" opacity=".45"/><polygon points="0,-80 -62,-16 0,8" fill="#aa8cff" opacity=".35"/>
<polygon points="62,-16 40,82 0,8" fill="#7a5ad0" opacity=".4"/><polygon points="-62,-16 -40,82 0,8" fill="#8a6ae0" opacity=".3"/><polygon points="40,82 -40,82 0,8" fill="#5a3a9a" opacity=".5"/>
<polygon points="0,-80 62,-16 40,82 -40,82 -62,-16" fill="none" stroke="rgba(210,190,255,.5)" stroke-width="1.1"/>
</g>
<!-- gem 4 (products) -->
<g transform="translate(1130,640)">
<polygon points="0,-66 50,-12 32,66 -32,66 -50,-12" fill="url(#c4)" opacity=".3"/>
<polygon points="0,-66 50,-12 0,6" fill="#7ff0d0" opacity=".45"/><polygon points="0,-66 -50,-12 0,6" fill="#5fe0c0" opacity=".35"/>
<polygon points="50,-12 32,66 0,6" fill="#2fa080" opacity=".4"/><polygon points="-50,-12 -32,66 0,6" fill="#3fb090" opacity=".3"/><polygon points="32,66 -32,66 0,6" fill="#1a7a5a" opacity=".5"/>
<polygon points="0,-66 50,-12 32,66 -32,66 -50,-12" fill="none" stroke="rgba(180,255,225,.5)" stroke-width="1.1"/>
</g>
<!-- shards / sparkle -->
<g fill="#cdeaff"><circle cx="500" cy="180" r="1.5" opacity=".6"/><circle cx="900" cy="520" r="1.4" opacity=".5"/><circle cx="280" cy="620" r="1.5" opacity=".5"/><circle cx="700" cy="700" r="1.3" opacity=".5"/></g>
</svg>
<div class="lbl" style="top:386px;left:720px;transform:translateX(-50%)"><div class="v" style="color:#9fe0f0">$3,840</div><div class="l">Net · ▲18%</div></div>
<div class="lbl" style="top:330px;left:330px;transform:translateX(-50%)"><div class="v" style="color:#9ab0ff">4.2×</div><div class="l">ROI</div></div>
<div class="lbl" style="top:300px;left:1080px;transform:translateX(-50%)"><div class="v" style="color:#c5a8ff">$58</div><div class="l">AI cost / $80</div></div>
<div class="lbl" style="top:640px;left:1130px;transform:translateX(-50%)"><div class="v" style="color:#7ff0d0">7</div><div class="l">Products live</div></div>
<div class="bar"><span style="color:#7fd0e6">🎙</span><input placeholder="Ask Jarvis, or type a /command…"><span style="color:#456a7c;font-size:12px">⌘K</span></div>
</body></html>
