<!doctype html><html><head><meta charset="utf-8"><title>T187</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#e8eef6;background:#070a10}
.top{display:flex;align-items:center;gap:14px;padding:22px 40px}
.wm{font-size:18px;font-weight:800;letter-spacing:3px;color:#5fd0c0}.st{font-size:12px;color:#5f8278}.r{margin-left:auto;font-size:13px;color:#8a98a4}
.wrap{display:grid;grid-template-columns:1fr 300px;gap:28px;height:calc(100vh - 200px);padding:6px 40px 0}
.hd{padding:0 40px}.hd h1{font-size:22px;font-weight:600}.hd h1 b{color:#5fd0c0}.hd p{font-size:13px;color:#5f8278;margin-top:4px}
.side{display:flex;flex-direction:column;justify-content:center;gap:8px;border-left:1px solid #16242a;padding-left:26px}
.side .k{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:#5f8278}
.row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #111c20}
.row .nm{flex:1;font-size:13px}.row .vv{font-size:14px;font-weight:700}
.bar{position:fixed;bottom:22px;left:40px;right:40px;display:flex;align-items:center;gap:12px;background:rgba(11,17,21,.9);border:1px solid #16242a;border-radius:13px;padding:11px 15px}
.bar input{flex:1;background:0;border:0;outline:0;color:#e8eef6;font-size:14px}.bar input::placeholder{color:#5f8278}
</style></head><body>
