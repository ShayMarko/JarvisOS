<!doctype html><html><head><meta charset="utf-8"><title>T2</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#dfeaf7;background:radial-gradient(900px 900px at 50% 42%,rgba(70,160,255,.18),transparent 62%),#04060e;display:flex;flex-direction:column;align-items:center}
.top{width:100%;display:flex;justify-content:space-between;align-items:center;padding:22px 34px}
.wm{font-size:18px;font-weight:800;letter-spacing:5px;color:#9fdfff}
.st{font-size:12px;letter-spacing:2px;color:#5f7characters}
.st{color:#6f86ad;font-size:12px;letter-spacing:2px}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.orb{width:300px;height:300px;border-radius:50%;position:relative;display:grid;place-items:center}
.core{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 50% 38%,#dffcff,#5cd6ff 45%,#2b6fc7 100%);box-shadow:0 0 90px rgba(70,170,255,.7),0 0 160px rgba(70,170,255,.35),inset 0 0 30px rgba(255,255,255,.6)}
.ring{position:absolute;border:1px solid rgba(120,200,255,.25);border-radius:50%}
.r1{width:200px;height:200px;border-top-color:rgba(120,200,255,.7)}.r2{width:260px;height:260px;border-left-color:rgba(155,140,255,.6)}.r3{width:320px;height:320px;border-bottom-color:rgba(120,200,255,.4)}
.say{margin-top:26px;font-size:22px;font-weight:300;letter-spacing:1px;color:#cfe6ff;text-align:center}
.hint{color:#6f86ad;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.chips{display:flex;gap:10px;margin-top:30px}
.chip{font-size:12px;color:#bcd7f5;background:rgba(20,34,60,.6);border:1px solid rgba(120,170,240,.18);padding:9px 16px;border-radius:99px;backdrop-filter:blur(8px)}
.bottom{width:100%;max-width:760px;margin-bottom:34px;display:flex;align-items:center;gap:12px;background:rgba(12,20,38,.7);border:1px solid rgba(120,170,240,.22);border-radius:18px;padding:13px 16px;backdrop-filter:blur(14px)}
.bottom input{flex:1;background:0;border:0;outline:0;color:#dfeaf7;font-size:15px}.bottom input::placeholder{color:#5f7characters}.bottom input::placeholder{color:#5d6f92}
.mic{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#5cd6ff,#2b6fc7);display:grid;place-items:center;color:#06121f}
</style></head><body>
<div class="top"><div class="wm">J A R V I S</div><div class="st">● ONLINE · STANDBY · OPUS</div></div>
<div class="stage">
<div class="orb"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="core"></div></div>
<div class="say">Good evening, Shay.</div>
<div class="hint">3 need you · 2 jobs running · ROI 4.2×</div>
<div class="chips"><div class="chip">◈ Money</div><div class="chip">⚇ Agents</div><div class="chip">≋ Activity</div><div class="chip">▤ Files</div></div>
</div>
<div class="bottom"><div class="mic">🎙</div><input placeholder="Say “Hey Jarvis”, or type…"><div style="color:#6f86ad;font-size:12px">⌘K</div></div>
</body></html>
