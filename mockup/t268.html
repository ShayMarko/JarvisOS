<!doctype html><html><head><meta charset="utf-8"><title>T268</title><style>
*{margin:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
body{height:100vh;overflow:hidden;background:radial-gradient(140% 110% at 50% 120%,#1a2a3a 0%,#0a1018 50%,#05080d 100%);color:#eaf3ff}
.room{position:absolute;inset:0;background:
 radial-gradient(40% 30% at 22% 30%,rgba(90,180,255,.10),transparent 70%),
 radial-gradient(36% 28% at 80% 24%,rgba(150,110,255,.10),transparent 70%)}
.gridfloor{position:absolute;left:0;right:0;bottom:0;height:42%;background-image:linear-gradient(rgba(110,170,240,.10) 1px,transparent 1px),linear-gradient(90deg,rgba(110,170,240,.10) 1px,transparent 1px);background-size:64px 64px;transform:perspective(420px) rotateX(62deg);transform-origin:bottom;opacity:.6}
.hand{position:absolute;left:50%;bottom:-40px;transform:translateX(-50%);width:300px;height:380px;background:radial-gradient(60% 50% at 50% 70%,rgba(255,210,180,.16),transparent 72%);filter:blur(2px)}
.wristline{position:absolute;left:50%;bottom:140px;transform:translateX(-50%) rotate(-7deg);width:340px;height:46px;border-radius:50%;background:linear-gradient(90deg,transparent,rgba(120,170,255,.18),transparent);border:1px solid rgba(150,200,255,.18)}
/* curved floating menu */
.menu{position:absolute;left:50%;bottom:200px;transform:translateX(-50%) rotateX(8deg);display:flex;align-items:flex-end;gap:0;filter:drop-shadow(0 18px 50px rgba(0,0,0,.55))}
.disc{position:relative;width:118px;height:118px;border-radius:24px;margin:0 -6px;background:linear-gradient(160deg,rgba(40,70,120,.55),rgba(24,38,68,.4));backdrop-filter:blur(8px);border:1px solid rgba(150,200,255,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 30px rgba(80,150,255,.14);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#dbe9ff}
.disc .ic{font-size:30px;margin-bottom:8px}
.disc .lb{font-size:11px;letter-spacing:.5px;color:#a9c4e6}
.disc.c{transform:translateY(-30px) scale(1.18);background:linear-gradient(160deg,rgba(80,150,255,.7),rgba(60,90,200,.5));border-color:rgba(190,220,255,.6);box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 0 46px rgba(90,160,255,.5);z-index:3}
.disc.l1{transform:translateY(-6px) rotateY(26deg);z-index:2}.disc.r1{transform:translateY(-6px) rotateY(-26deg);z-index:2}
.disc.l2{transform:translateY(14px) rotateY(44deg);opacity:.85}.disc.r2{transform:translateY(14px) rotateY(-44deg);opacity:.85}
.disc .badge{position:absolute;top:-7px;right:-7px;background:#ff5d73;color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;border:2px solid #14223e}
/* center readout above */
.read{position:absolute;left:50%;bottom:340px;transform:translateX(-50%);text-align:center}
.read .g{font-size:13px;letter-spacing:3px;color:#7fa8d8}
.read .net{font-size:40px;font-weight:800;letter-spacing:-1px;margin-top:6px;text-shadow:0 0 24px rgba(90,160,255,.5)}
.read .sub{font-size:13px;color:#8fb0d6;margin-top:4px}
.read .net b{color:#56e0a8}
.wm{position:absolute;top:26px;left:50%;transform:translateX(-50%);font-size:14px;letter-spacing:5px;font-weight:800;color:#7fa8d8}
.st{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:#5d7a9c}
.hint{position:absolute;bottom:84px;left:50%;transform:translateX(-50%);font-size:12px;color:#6b8aac;letter-spacing:.5px}
</style></head><body>
<div class="room"></div><div class="gridfloor"></div>
<div class="wm">JARVIS</div><div class="st">● ONLINE · OPUS · 20:34 · TUE JUN 09</div>
<div class="read"><div class="g">GOOD EVENING, SHAY</div><div class="net">$3,840 <b>▲18%</b></div><div class="sub">net · month · ROI 4.2× · AI cost $58/$80</div></div>
<div class="menu">
<div class="disc l2"><div class="ic">📚</div><div class="lb">Library</div></div>
<div class="disc l1"><div class="ic">🤖</div><div class="lb">Agents 51</div></div>
<div class="disc c"><div class="badge">3</div><div class="ic">⚠️</div><div class="lb">Needs you</div></div>
<div class="disc r1"><div class="ic">💰</div><div class="lb">Money</div></div>
<div class="disc r2"><div class="ic">🔌</div><div class="lb">26 · 9 live</div></div>
</div>
<div class="wristline"></div><div class="hand"></div>
<div class="hint">Pinch to select · “Hey Jarvis” to speak</div>
</body></html>
