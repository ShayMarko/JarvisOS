<!doctype html><html><head><meta charset="utf-8"><title>T28</title><style>
*{margin:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{height:100vh;overflow:hidden;color:#eef2f8;background:radial-gradient(800px 1000px at 50% 0%,#141a30,#070910)}
.wrap{max-width:440px;margin:0 auto;height:100vh;padding:46px 20px 30px;display:flex;flex-direction:column;gap:14px}
.time{text-align:center;font-size:54px;font-weight:200;letter-spacing:1px;font-variant-numeric:tabular-nums}
.date{text-align:center;font-size:13px;color:#8a96b4;margin-top:-6px;margin-bottom:6px}
.w{border-radius:22px;padding:16px 18px;backdrop-filter:blur(14px);border:1px solid rgba(150,170,220,.14)}
.wide{background:rgba(24,32,54,.6)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.wl{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#8a96b4;display:flex;align-items:center;gap:7px}
.big{font-size:30px;font-weight:800;margin-top:8px}.big small{font-size:13px;color:#8a96b4}
.appr{display:flex;align-items:center;gap:10px;font-size:14px;margin-top:10px}.dotc{width:8px;height:8px;border-radius:50%;background:#ff6b81}.dotc.h{background:#ffc85a}
.go{margin-left:auto;font-size:11px;font-weight:700;color:#070910;background:linear-gradient(135deg,#6ad1ff,#9b8cff);border-radius:8px;padding:5px 11px}
.bar{height:6px;border-radius:6px;background:rgba(150,170,220,.18);margin-top:8px}.bar i{display:block;height:100%;border-radius:6px;background:#6ad1ff}
.mic{margin-top:auto;display:flex;align-items:center;gap:12px;background:rgba(24,32,54,.7);border:1px solid rgba(150,170,220,.2);border-radius:18px;padding:12px 16px}
.mic input{flex:1;background:0;border:0;outline:0;color:#eef2f8;font-size:15px}.mic input::placeholder{color:#6a7characters}.mic input::placeholder{color:#6a7694}
</style></head><body><div class="wrap">

</div></body></html>
