<!doctype html><html><head><meta charset="utf-8"><title>T270</title><style>
*{margin:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
body{height:100vh;overflow:hidden;background:#000;color:#dfe6ee}
/* dark mirror surface */
.mirror{position:absolute;inset:0;background:
 radial-gradient(120% 90% at 50% -10%,#101418 0%,#0a0c0f 45%,#050607 100%);
 box-shadow:inset 0 0 200px rgba(0,0,0,.8)}
.sheen{position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.025) 45%,transparent 60%);pointer-events:none}
.frame{position:absolute;inset:14px;border:10px solid #0c0d0f;border-radius:6px;box-shadow:inset 0 0 0 1px #1a1c1f,0 0 0 1px #000}
/* widgets float as if reflected — soft, slightly desaturated */
.stage{position:absolute;inset:60px 80px;display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:auto auto 1fr;gap:0 60px;align-content:start}
.clock{grid-column:1;grid-row:1/3}
.time{font-size:118px;font-weight:200;letter-spacing:-4px;line-height:.9;color:#eef3f8;opacity:.92}
.date{font-size:18px;letter-spacing:5px;text-transform:uppercase;color:#7d8893;margin-top:10px}
.greet{font-size:20px;color:#aeb8c2;margin-top:22px;font-weight:300}
.greet b{color:#bfe9d6;font-weight:500}
.w{padding:18px 0;border-top:1px solid rgba(255,255,255,.07)}
.money{grid-column:2;grid-row:1;border-top:0;padding-top:0}
.money .lb{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#6f7a85}
.money .v{font-size:44px;font-weight:300;letter-spacing:-1px;margin-top:6px;color:#eef3f8}
.money .v b{color:#5fdca6;font-size:20px;font-weight:500}
.money .s{font-size:13px;color:#7d8893;margin-top:4px}
.needs{grid-column:2;grid-row:2/4}
.needs .lb{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#6f7a85;margin-bottom:14px}
.ni{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:15px;color:#cdd5de;font-weight:300}
.tag{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:5px}
.crit{background:rgba(255,90,110,.16);color:#ff8a9a}.high{background:rgba(255,180,84,.16);color:#ffc878}
.ni small{margin-left:auto;color:#6f7a85;font-size:12px}
.jobs{grid-column:1;grid-row:3;align-self:end}
.jobs .lb{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#6f7a85;margin-bottom:12px}
.jb{font-size:14px;color:#aeb8c2;display:flex;align-items:center;gap:12px;margin-bottom:12px;font-weight:300}
.bar{flex:1;height:4px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.bar i{display:block;height:100%;background:#5fb8dc}
.wm{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:12px;letter-spacing:6px;color:#5a646e}
</style></head><body>
<div class="mirror"></div>
<div class="stage">
<div class="clock"><div class="time">20:34</div><div class="date">Tue · Jun 09</div><div class="greet">Good morning routine ready,<br><b>Shay.</b></div></div>
<div class="money"><div class="lb">Net · month</div><div class="v">$3,840 <b>▲18%</b></div><div class="s">ROI 4.2× · AI cost $58/$80</div></div>
<div class="needs"><div class="lb">Needs you · 3</div>
<div class="ni"><span class="tag crit">CRIT</span>Send invoice → 14<small>$1,240</small></div>
<div class="ni"><span class="tag high">HIGH</span>Publish SaaS starter<small>$39</small></div>
<div class="ni"><span class="tag high">HIGH</span>Deploy micro-API<small>Cloudflare</small></div>
</div>
<div class="jobs"><div class="lb">Running</div>
<div class="jb"><span>habit-tracker</span><span class="bar"><i style="width:72%"></i></span><span>72%</span></div>
<div class="jb"><span>research niche</span><span class="bar"><i style="width:40%;background:#a08cf0"></i></span><span>40%</span></div>
</div>
</div>
<div class="sheen"></div><div class="frame"></div>
<div class="wm">JARVIS · ● ONLINE · OPUS</div>
</body></html>
