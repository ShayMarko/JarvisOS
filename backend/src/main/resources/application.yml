spring:
  application:
    name: jarvis-core

  datasource:
    # Local-first SQLite database. File lives under ./data relative to the working dir.
    url: jdbc:sqlite:${JARVIS_DB_PATH:./data/jarvis.db}
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate neither creates nor validates it.
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${JARVIS_PORT:8088}
  # Local-first: only listen on the loopback interface so other machines can't reach Jarvis.
  address: ${JARVIS_BIND:127.0.0.1}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

# --- Jarvis-specific configuration -------------------------------------------
# Mirrors Appendix B of the spec: a virtual Jarvis Explorer root plus an
# allow-list of external folders. Blocked paths are always denied.
jarvis:
  security:
    # SAFE = read-only, ASSISTED = mutate but confirm deletes, AUTONOMOUS = mutate freely (spec §11.1)
    permission-mode: ${JARVIS_PERMISSION_MODE:ASSISTED}
    # Passphrase to derive the Secrets Vault AES key. Override in production.
    vault-key: ${JARVIS_VAULT_KEY:jarvis-dev-vault-key-change-me}
    # Optional API token. Blank = open (loopback only). Set before exposing Jarvis off-box; then every
    # /api/** call must send it (X-Jarvis-Token header, Authorization: Bearer, or ?token=).
    api-token: ${JARVIS_API_TOKEN:}
  # Backups (see JarvisBackupProperties). cloud-dir = a folder a cloud client syncs; encrypted backups land there.
  backup:
    cloud-dir: ${JARVIS_BACKUP_CLOUD_DIR:}
  monitor:
    # How often the live System Monitor stream (SSE) pushes a snapshot.
    stream-interval-ms: ${JARVIS_MONITOR_INTERVAL:2000}
  # Jarvis Brain / model adapter (spec §15). Default is the offline mock model.
  ai:
    provider: ${JARVIS_AI_PROVIDER:ollama}    # mock | claude | ollama | openai (defaults to local Ollama; falls back to mock if down)
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    # Anthropic Model-Router tiers — ALL controlled here (ModelCatalog reads these, no hard-coded IDs):
    model: ${JARVIS_AI_MODEL:claude-opus-4-8}                          # HEAVY tier / default Anthropic model
    claude-standard-model: ${JARVIS_AI_CLAUDE_STANDARD:claude-sonnet-4-8}  # STANDARD tier
    planner-model-claude: ${JARVIS_AI_PLANNER_CLAUDE:claude-3-5-haiku-latest}  # LIGHT tier + the cheap planner call
    planner-model-openai: ${JARVIS_AI_PLANNER_OPENAI:gpt-4o-mini}
    ollama-model: ${JARVIS_AI_OLLAMA_MODEL:qwen2.5-coder:14b}  # local Ollama model (best fit for 16GB M1)
    ollama-timeout-seconds: ${JARVIS_AI_OLLAMA_TIMEOUT:300}  # read timeout per generation (big models are slow)
    ollama-num-predict: ${JARVIS_AI_OLLAMA_NUM_PREDICT:8192}  # local max output tokens (free; must fit whole files)
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${JARVIS_AI_OPENAI_MODEL:gpt-4o-mini}  # OpenAI model
    max-tokens: 8192        # paid-provider completion CAP (not forced spend) — high enough that big builds don't truncate
    max-steps: 12      # tool-loop iterations per agent run (enough to write a multi-file project)
    # Safety net for PAID providers (Claude/OpenAI): hard cap on tokens/day. 0 = unlimited.
    # Ollama + mock are never metered. Adjustable live in Settings; pause = kill-switch.
    daily-token-budget: ${JARVIS_AI_DAILY_TOKEN_BUDGET:0}
    privacy: ${JARVIS_AI_PRIVACY:BALANCED}   # BALANCED | PRIVATE | QUALITY | CHEAP
    privacy-guard: ${JARVIS_AI_PRIVACY_GUARD:true}  # keep sensitive content on the local model, never cloud
  # Global JARVIS personality, prepended to every agent's system prompt.
  persona:
    enabled: ${JARVIS_PERSONA_ENABLED:true}
    # Uses the built-in British/dry-wit default (see JarvisPersonaProperties).
    # Override the whole voice by setting `prompt:` to a block scalar here.
  # Declarative restrictions policy (see JarvisPolicyProperties). Hard floor under the
  # Approval Center: a denied command NEVER runs, even if the user would approve it.
  policy:
    # Case-insensitive regex patterns for commands that are forbidden outright.
    denied-commands:
      - "\\brm\\s+-rf?\\s+/(\\s|$)"          # rm -rf / (wipe root)
      - ":\\(\\)\\s*\\{.*\\};"                  # fork bomb
      - "\\bmkfs\\b"                            # format a filesystem
      - ">\\s*/dev/(disk|sd|rdisk)"            # overwrite a raw disk device
    # Host substrings that web fetch/search must refuse.
    denied-hosts: []
    #   - internal-admin.local
    # Extra risk rules merged on top of the built-in classifier set.
    risk-rules: []
    #   - pattern: "\\bgit\\s+push\\s+--force\\b"
    #     level: HIGH
  # MCP servers (see McpProperties). Jarvis speaks JSON-RPC over stdio to each and
  # exposes its tools to the agent loop. Empty by default — runs fine with none.
  mcp:
    startup-timeout-seconds: 12
    servers:
      # Playwright browser automation (official MCP). OFF by default — set JARVIS_MCP_PLAYWRIGHT_ENABLED=true
      # (needs Node/npx; first run downloads the browser). When on, its tools light up via mcp_call.
      - name: playwright
        command: npx
        args: ["-y", "@playwright/mcp@latest", "--headless"]
        enabled: ${JARVIS_MCP_PLAYWRIGHT_ENABLED:false}
    #   - name: filesystem
    #     command: npx
    #     args: ["-y", "@modelcontextprotocol/server-filesystem", "/Users/shaymarko/Desktop"]
    #     enabled: true
  # OAuth providers (see OAuthProperties). Tokens are stored encrypted in the vault
  # and auto-refreshed. Empty by default; add a provider's client id/secret to enable.
  oauth:
    base-url: ${JARVIS_BASE_URL:http://localhost:8088}
    providers: {}
    #   google:
    #     auth-url: https://accounts.google.com/o/oauth2/v2/auth
    #     token-url: https://oauth2.googleapis.com/token
    #     client-id: ${GOOGLE_CLIENT_ID:}
    #     client-secret: ${GOOGLE_CLIENT_SECRET:}
    #     scopes: ["https://www.googleapis.com/auth/drive.readonly"]
  # Project Intelligence (see JarvisProjectsProperties): scan dev folders, open in the right IDE.
  projects:
    scan-roots:
      - ~/Projects
      - ~/Developer
      - ~/Code
    max-depth: 2
    default-ide: Visual Studio Code
    ide-by-type:
      maven: IntelliJ IDEA
      gradle: IntelliJ IDEA
      node: Visual Studio Code
      python: Visual Studio Code
      rust: Visual Studio Code
      go: Visual Studio Code
      xcode: Xcode
  # Plugin SDK (see JarvisPluginProperties). Drops-in JARs that implement
  # com.jarvis.plugin.spi.JarvisPlugin are loaded at startup; their tools are
  # registered and granted to the General agent. The marketplace reads catalog.json.
  plugins:
    enabled: ${JARVIS_PLUGINS_ENABLED:true}
    dir: ${JARVIS_PLUGINS_DIR:}          # blank ⇒ <jarvisRoot>/Plugins
    catalog: ${JARVIS_PLUGINS_CATALOG:}  # blank ⇒ <dir>/catalog.json
  # Optional Telegram phone bridge (see TelegramProperties). Dormant until a BotFather token is set:
  # message @BotFather → /newbot → paste the token into JARVIS_TELEGRAM_BOT_TOKEN. Then you can text
  # Jarvis from your phone and get notifications/digests pushed — no inbound port opened on the Mac.
  telegram:
    enabled: ${JARVIS_TELEGRAM_ENABLED:true}        # still inert without a token below
    bot-token: ${JARVIS_TELEGRAM_BOT_TOKEN:}        # secret — from @BotFather
    chat-id: ${JARVIS_TELEGRAM_CHAT_ID:}            # your chat id → where proactive pushes go
    polling: ${JARVIS_TELEGRAM_POLLING:true}        # listen for inbound messages
    push-notifications: ${JARVIS_TELEGRAM_PUSH:true} # mirror Notification Center to your phone
    api-base-url: ${JARVIS_TELEGRAM_API_URL:https://api.telegram.org}
    long-poll-seconds: 50          # getUpdates hold time
    read-timeout-seconds: 65       # must exceed long-poll-seconds
    connect-timeout-seconds: 5
    max-message-chars: 4000        # Telegram hard-caps at 4096
    idle-poll-ms: 1000             # breather between empty polls
    error-backoff-ms: 3000         # back-off after a poll error
  # Private Discord control channel (see DiscordProperties) — command Jarvis from your phone. Dormant
  # until a bot token + channel id are set. Enable MESSAGE CONTENT intent on the bot in the dev portal.
  discord:
    enabled: ${JARVIS_DISCORD_ENABLED:true}          # still inert without a token + channel below
    bot-token: ${JARVIS_DISCORD_BOT_TOKEN:}          # secret — Discord Developer Portal → Bot
    channel-id: ${JARVIS_DISCORD_CHANNEL_ID:}        # the ONE private channel Jarvis listens/replies in
    push-notifications: ${JARVIS_DISCORD_PUSH:true}  # mirror Notification Center + daily briefing here
    max-message-chars: 1900        # Discord hard-caps at 2000
    reconnect-backoff-ms: 5000
  # Daily morning briefing pushed to the Discord channel (see JarvisBriefingProperties).
  briefing:
    enabled: ${JARVIS_BRIEFING_ENABLED:true}
    cron: ${JARVIS_BRIEFING_CRON:0 0 8 * * *}   # 08:00 daily (6-field Spring cron)
    zone: ${JARVIS_BRIEFING_ZONE:}              # blank = server timezone
    include-system: true
  # Watchdog / self-healing (see JarvisWatchdogProperties) — alerts the owner when a dependency breaks.
  watchdog:
    enabled: ${JARVIS_WATCHDOG_ENABLED:true}
    check-interval-ms: 120000        # every 2 min
    check-ollama: true
    disk-critical-percent: 95
    ollama-restart-command: ${JARVIS_WATCHDOG_OLLAMA_RESTART:}   # e.g. "brew services restart ollama"; blank = alert only
    ollama-ping-timeout-ms: 3000
  # Proactive watchers / heartbeat (see JarvisProactiveProperties). Background checks that PROPOSE
  # actions via the Notification Center (also pushed to Telegram if configured) — never act unasked.
  proactive:
    enabled: ${JARVIS_PROACTIVE_ENABLED:true}
    disk-percent-threshold: 90
    check-interval-ms: 600000        # every 10 min
    watch-folders: [Downloads, Screenshots, Generated]
  # Second-brain auto-index (see JarvisSecondBrainProperties). Keeps the Knowledge Base continuously
  # in sync with notes/docs so the model's kb_search always has complete, current recall.
  second-brain:
    enabled: ${JARVIS_SECOND_BRAIN_ENABLED:true}
    interval-ms: 900000              # sweep every 15 min
    folders: [Documents, Notes]
    extensions: [.txt, .md, .markdown, .text, .log, .csv, .json, .yml, .yaml, .rtf]
    max-file-bytes: 1000000          # skip files > 1 MB
    max-files-per-tick: 25
    max-depth: 4
    prune-deleted: true
  # Preference-learning loop (see JarvisPreferenceProperties). Notices durable facts/preferences and
  # OFFERS to save them to the About-Me profile via the Approval Center (consent) — judged on the local model.
  preference-learning:
    enabled: ${JARVIS_PREFERENCE_LEARNING_ENABLED:true}
    min-message-chars: 12
  # Tunable limits/sizes (see JarvisLimitsProperties).
  limits:
    conversation-history-turns: 6     # replayed to the model every call; lower = fewer input tokens
    file-max-text-bytes: 2097152            # 2 MB — max file the text viewer loads
    file-search-max-results: 200
    kb-chunk-size: 1000                      # chars per KB chunk
    kb-chunk-overlap: 150
    kb-max-files-per-folder: 50
    kb-search-top-k: 5
    sandbox-timeout-seconds: 15
    sandbox-max-output-chars: 100000
    web-fetch-max-chars: 2000
    web-fetch-timeout-seconds: 12
    secret-hint-length: 4                    # trailing chars shown as ••••1234
  filesystem:
    # The virtual home of Jarvis ("C: drive"). Created on startup if missing.
    jarvis-root: ${JARVIS_ROOT:~/Documents/jarvis_drive}
    # Standard sub-folders created inside the Jarvis root.
    explorer-folders:
      - Downloads
      - Documents
      - Projects
      - Media
      - Notes
      - Emails
      - Generated
      - Screenshots
      - Logs
    # Additional real folders Jarvis may read/write, each with a permission level.
    # Surfaced as navigable entries at the Explorer root.
    allowed-folders:
      - name: Documents
        path: ~/Documents
        permission: READ_WRITE
    #   - name: desktop
    #     path: ~/Desktop
    #     permission: READ_ONLY
    blocked-paths:
      - /System
      - /Library
      - /private
      - ~/.ssh
      - ~/.aws
      - ~/.config/secrets

logging:
  level:
    com.jarvis: INFO
